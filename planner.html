        function TimeInputField({ value = "00:00", onChange }) {
            const [hour, minute] = (String(value).match(/^(\d{1,2}):(\d{1,2})$/) || ["00:00", "00", "00"]).slice(1, 3);
            const h = String(Math.min(23, Math.max(0, parseInt(hour, 10) || 0))).padStart(2, "0");
            const m = String(Math.min(59, Math.max(0, parseInt(minute, 10) || 0))).padStart(2, "0");

            const onChangeSplit = (newH, newM) => {
                const hh = String(Math.min(23, Math.max(0, Number(newH)))).padStart(2, "0");
                const mm = String(Math.min(59, Math.max(0, Number(newM)))).padStart(2, "0");
                onChange(`${hh}:${mm}`);
            };

            const hrs = Array.from({ length: 24 }, (_, i) => String(i).padStart(2, "0"));
            const mins = ["00", "15", "30", "45"];

            return e("div", {
                style: {
                    display: "inline-flex",
                    alignItems: "center",
                    gap: 4,
                    border: "1px solid var(--border)",
                    borderRadius: 8,
                    background: "var(--bg2)",
                    padding: "2px 4px"
                }
            },
                e("select", {
                    value: h,
                    onChange: ev => onChangeSplit(ev.target.value, m),
                    style: {
                        border: "none",
                        background: "transparent",
                        color: "var(--text0)",
                        fontWeight: 600,
                        outline: "none",
                        width: 42,
                        appearance: "none",
                        lineHeight: "1.1"
                    }
                }, hrs.map(v => e("option", { key: v, value: v }, v))),
                e("span", { style: { color: "var(--text3)", fontWeight: 700, lineHeight: "1.1" } }, ":"),
                e("select", {
                    value: mins.includes(m) ? m : "00",
                    onChange: ev => onChangeSplit(h, ev.target.value),
                    style: {
                        border: "none",
                        background: "transparent",
                        color: "var(--text0)",
                        fontWeight: 600,
                        outline: "none",
                        width: 42,
                        appearance: "none",
                        lineHeight: "1.1"
                    }
                }, mins.map(v => e("option", { key: v, value: v }, v)))
            );
        }

        function FranjasEditor({ franjas, onSave, onClose, inline = false, franjaMode = 3 }) {
            const f = franjas || (franjaMode === 6 ? DEFAULT_FRANJAS_6 : DEFAULT_FRANJAS_3);

            function hToStr(value) {
                let n = Number(value);
                if (Number.isNaN(n) || n < 0) n = 0;
                if (n >= 24) return "00:00";
                const h = Math.floor(n);
                const m = Math.round((n - h) * 60);
                const mm = String(m).padStart(2, '0');
                const hh = String(h).padStart(2, '0');
                return `${hh}:${mm}`;
            }

            function toH(t) {
                if (!t) return 0;
                const parts = String(t).split(":");
                if (!parts.length) return 0;
                const hours = parseInt(parts[0], 10);
                const minutes = parts[1] ? parseInt(parts[1].slice(0,2), 10) : 0;
                if (Number.isNaN(hours) || Number.isNaN(minutes)) return 0;
                return hours + (minutes / 60);
            }

            const [h0, setH0] = useState(() => hToStr(franjaMode === 6 ? f.manana1?.inicio : f.manana?.inicio ?? 6));
            const [h1, setH1] = useState(() => hToStr(franjaMode === 6 ? f.manana1?.fin : f.tarde?.inicio ?? 13));
            const [h2, setH2] = useState(() => hToStr(franjaMode === 6 ? f.manana2?.fin : f.noche?.inicio ?? 19));
            const [h3, setH3] = useState(() => hToStr(franjaMode === 6 ? f.tarde1?.fin : f.noche?.fin ?? 24));
            const [h4, setH4] = useState(() => hToStr(f.tarde2?.fin ?? 0));
            const [h5, setH5] = useState(() => hToStr(f.noche1?.fin ?? 0));
            const [h6, setH6] = useState(() => hToStr(franjaMode === 6 ? f.noche2?.fin : f.noche?.fin ?? 24));
            const [err, setErr] = useState("");

            useEffect(() => {
                setH0(hToStr(franjaMode === 6 ? f.manana1?.inicio : f.manana?.inicio ?? 6));
                setH1(hToStr(franjaMode === 6 ? f.manana1?.fin : f.tarde?.inicio ?? 13));
                setH2(hToStr(franjaMode === 6 ? f.manana2?.fin : f.noche?.inicio ?? 19));
                setH3(hToStr(franjaMode === 6 ? f.tarde1?.fin : f.noche?.fin ?? 24));
                setH4(hToStr(f.tarde2?.fin ?? 0));
                setH5(hToStr(f.noche1?.fin ?? 0));
                setH6(hToStr(franjaMode === 6 ? f.noche2?.fin : f.noche?.fin ?? 24));
            }, [franjaMode, f.manana, f.manana1, f.manana2, f.tarde, f.tarde1, f.tarde2, f.noche, f.noche1, f.noche2]);

            const i0 = toH(h0), i1 = toH(h1), i2 = toH(h2);
            const i3 = toH(h3);
            const i4 = franjaMode === 6 ? toH(h4) : null;
            const i5 = franjaMode === 6 ? toH(h5) : null;
            let i6 = toH(h6);

            // allow next-day midnight (00:00) or roll-over for final block
            if (i6 === 0) i6 = 24;
            if (franjaMode === 6 && i5 !== null && i6 <= i5) i6 += 24;
            if (franjaMode === 3 && i6 <= i2) i6 += 24;

            function fmtT(h) {
                if (h === 24) return "00:00";
                if (h === null || h === undefined || Number.isNaN(Number(h))) return "00:00";
                const v = Number(h);
                const hh = Math.floor(v) % 24;
                const mm = Math.round((v - Math.floor(v)) * 60);
                const ss = String(mm).padStart(2, '0');
                return `${String(hh).padStart(2, '0')}:${ss}`;
            }
            function fmtRango(a, b) { return `${fmtT(a)} – ${fmtT(b)}`; }

            let valid = true;
            let errMsg = "";
            if (franjaMode === 6) {
                valid = i0 >= 0 && i0 < i1 && i1 < i2 && i2 < i3 && i3 < i4 && i4 < i5 && i5 < i6 && i6 <= 24;
                if (!valid) errMsg = "Las franjas deben estar en orden y el fin de Noche 2 debe ser 24";
            } else {
                valid = i0 >= 0 && i0 < i1 && i1 < i2 && i2 < i6 && i6 <= 24;
                if (!valid) errMsg = "Elige horarios válidos: Mañana < Tarde < Noche y fin de Noche = 24";
            }

            function go() {
                if (!valid) { setErr(errMsg); return; }
                const newFranjas = franjaMode === 6 ? {
                    manana1: { label: "Mañana 1", inicio: i0, fin: i1, emoji: "🌅" },
                    manana2: { label: "Mañana 2", inicio: i1, fin: i2, emoji: "☀️" },
                    tarde1: { label: "Tarde 1", inicio: i2, fin: i3, emoji: "🌤" },
                    tarde2: { label: "Tarde 2", inicio: i3, fin: i4, emoji: "☀️" },
                    noche1: { label: "Noche 1", inicio: i4, fin: i5, emoji: "🌙" },
                    noche2: { label: "Noche 2", inicio: i5, fin: i6, emoji: "🌌" },
                } : {
                    manana: { label: "Mañana", inicio: i0, fin: i1, emoji: "🌅" },
                    tarde: { label: "Tarde", inicio: i1, fin: i2, emoji: "☀️" },
                    noche: { label: "Noche", inicio: i2, fin: i6, emoji: "🌙" },
                };
                onSave(newFranjas);
                onClose && onClose();
            }

            const rows = franjaMode === 6 ? [
                { emoji: "🌅", label: "Mañana 1", desde: { v: h0, set: setH0 }, hasta: { v: h1, set: setH1, label: "inicio de Mañana 2" } },
                { emoji: "🌅", label: "Mañana 2", desde: { v: h1, set: setH1 }, hasta: { v: h2, set: setH2, label: "inicio de Tarde 1" } },
                { emoji: "🌤", label: "Tarde 1", desde: { v: h2, set: setH2 }, hasta: { v: h3, set: setH3, label: "inicio de Tarde 2" } },
                { emoji: "☀️", label: "Tarde 2", desde: { v: h3, set: setH3 }, hasta: { v: h4, set: setH4, label: "inicio de Noche 1" } },
                { emoji: "🌙", label: "Noche 1", desde: { v: h4, set: setH4 }, hasta: { v: h5, set: setH5, label: "inicio de Noche 2" } },
                { emoji: "🌌", label: "Noche 2", desde: { v: h5, set: setH5 }, hasta: { v: h6, set: setH6, label: "fin de Noche" } },
            ] : [
                { emoji: "🌅", label: "Mañana", desde: { v: h0, set: setH0 }, hasta: { v: h1, set: setH1, label: "inicio de Tarde" } },
                { emoji: "☀️", label: "Tarde", desde: { v: h1, set: setH1 }, hasta: { v: h2, set: setH2, label: "inicio de Noche" } },
                { emoji: "🌙", label: "Noche", desde: { v: h2, set: setH2 }, hasta: { v: h6, set: setH6, label: "fin de Noche" } },
            ];

            const preview = franjaMode === 6 ? [
                { emoji: "🌅", label: "Mañana 1", rango: fmtRango(i0, i1) },
                { emoji: "🌅", label: "Mañana 2", rango: fmtRango(i1, i2) },
                { emoji: "🌤", label: "Tarde 1", rango: fmtRango(i2, i3) },
                { emoji: "☀️", label: "Tarde 2", rango: fmtRango(i3, i4) },
                { emoji: "🌙", label: "Noche 1", rango: fmtRango(i4, i5) },
                { emoji: "🌌", label: "Noche 2", rango: fmtRango(i5, i6) },
            ] : [
                { emoji: "🌅", label: "Mañana", rango: fmtRango(i0, i1) },
                { emoji: "☀️", label: "Tarde", rango: fmtRango(i1, i2) },
                { emoji: "🌙", label: "Noche", rango: fmtRango(i2, i6) },
            ];

            const inner = e("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
                (err || errMsg) && e("div", { className: "ferr", style: { padding: "5px 9px", fontSize: 11 } }, err || errMsg),
                e("div", { style: { display: "flex", flexDirection: "column", gap: 8 } },
                    rows.map(r => e("div", { key: r.label, style: { display: "flex", alignItems: "center", gap: 8 } },
                        e("span", { style: { fontSize: 15, width: 24, textAlign: "center", flexShrink: 0 } }, r.emoji),
                        e("span", { style: { fontSize: 11, color: "var(--text0)", fontWeight: 500, width: 56, flexShrink: 0 } }, r.label),
                        e("div", { style: { display: "flex", alignItems: "center", gap: 6 } },
                            e(TimeInputField, { value: r.desde.v, onChange: r.desde.set }),
                            e("span", { style: { fontSize: 10, color: "var(--text3)" } }, "–"),
                            e(TimeInputField, { value: r.hasta.v, onChange: r.hasta.set })

                        )
                    ))
                ),
                e("div", {
                    style: {
                        padding: "8px 10px", background: "var(--bg2)", borderRadius: 5, fontSize: 10,
                        color: valid ? "var(--text2)" : "var(--err-text)"
                    }
                },
                    preview.map(p => e("div", { key: p.label }, p.emoji + " " + p.label + ":  " + p.rango))
                ),
                e("div", { style: { display: "flex", gap: 8, justifyContent: "flex-end" } },
                    onClose && e("button", { className: "cancbtn", onClick: onClose }, "Cancelar"),
                    e("button", { className: "savebtn", style: { opacity: valid ? 1 : .5 }, onClick: go }, "✓ Guardar")
                )
            );

            if (inline) return inner;

            return e("div", { className: "ov", onClick: onClose },
                e("div", { className: "mod", style: { maxWidth: 380 }, onClick: ev => ev.stopPropagation() },
                    e("div", { className: "mhd" },
                        e("span", { style: { fontSize: 18 } }, "🕐"),
                        e("span", { className: "mtit" }, "Franjas del día"),
                        e("button", { className: "mclose", onClick: onClose }, "✕")
                    ),
                    e("div", { className: "mbody" }, inner)
                )
            );
        }

                try { const s = localStorage.getItem("uai-filtro-periodos"); return s ? JSON.parse(s) : ["c1", "c2", "anual"]; }

            const [chromeHover, setChromeHover] = useState(false);
            const appRef = useRef(null);
            const chromeShellRef = useRef(null);
            const chromeExpanded = chromePinned || chromeHover;

            useEffect(() => { localStorage.setItem("uai-chrome-pinned", chromePinned ? "true" : "false"); }, [chromePinned]);

            useLayoutEffect(() => {
                const appEl = appRef.current;
                const shellEl = chromeShellRef.current;
                if (!appEl || !shellEl) return;

                const updateChromeOffset = () => {
                    const shellHeight = Math.ceil(shellEl.getBoundingClientRect().height);
                    const peekHeight = parseFloat(getComputedStyle(shellEl).getPropertyValue("--chrome-peek-height")) || 26;
                    const visibleHeight = chromeExpanded ? shellHeight : 0;
                    const safeGap = chromeExpanded ? 14 : 22;
                    appEl.style.setProperty("--chrome-offset", `${Math.max(visibleHeight, 0) + safeGap}px`);
                };

                updateChromeOffset();

                const ro = new ResizeObserver(updateChromeOffset);
                ro.observe(shellEl);
                window.addEventListener("resize", updateChromeOffset);
                return () => {
                    ro.disconnect();
                    window.removeEventListener("resize", updateChromeOffset);
                };
            }, [chromeExpanded, view]);

            function showChromeTemporarily() {
                if (!chromePinned) setChromeHover(true);

            useEffect(() => {

                    });
                }
            }, []);

            useEffect(() => {

                        .then(() => { driveMarkSaved(); setSyncStatus("saved"); setDirty(false); lastExp.current = hashData(data); })
                        .catch(err => { setSyncStatus("error"); setSyncMsg(err.message); });
                }, 4000);
                return () => clearTimeout(autoSaveTimer.current);
            }, [data, driveConnected, dirty]);

            const themeObj = THEMES.find(t => t.id === themeId) || THEMES[0];
            const isDark = themeObj.isDark;
            const mmap = useMemo(() => Object.fromEntries(data.materias.map(m => [m.id, m])), [data]);
            const tipos = data.tipos || DEFAULT_TIPOS;
            const tmap = useMemo(() => Object.fromEntries(tipos.map(t => [t.id, t])), [tipos]);

            // derive sel from data so it auto-updates on toggleItem
            const sel = selId ? data.tareas.find(t => t.id === selId) || null : null;

            function move(id, s) { setData(d => ({ ...d, tareas: d.tareas.map(t => t.id === id ? { ...t, estado: s } : t) })); }
            function moveTaskToDate(id, fecha, field = "fechaLimite") {
                setData(d => ({ ...d, tareas: d.tareas.map(t => t.id === id ? { ...t, [field]: fecha } : t) }));

                    })
                }));
            }
            function saveTask(t) {
                if (t.id) setData(d => ({ ...d, tareas: d.tareas.map(x => x.id === t.id ? t : x) }));
                else setData(d => ({ ...d, tareas: [...d.tareas, { ...t, id: "u" + Date.now() }] }));

            function saveImportedTasks(tasks) {
                if (!tasks || !tasks.length) return;
                const stamp = Date.now();
                const batch = tasks.map((t, i) => ({
                    ...t,
                    id: `u${stamp}_${i}`,
                    fechaInicio: t.fechaInicio || null,
                    fechaLimite: t.fechaLimite || null,
                    items: cloneChecklist(t.items)
                }));

                setForm(null);
            }
            function del(id) { setData(d => ({ ...d, tareas: d.tareas.filter(t => t.id !== id) })); setSelId(null); }
            function handleDriveConnect(fromWelcome = false) {
                driveConnect((token, err) => {
                    if (err) { setSyncMsg("Error al conectar: " + err); return; }
                    setDriveConnected(true); setSyncStatus("idle");
                    toggleAutoSave(true);
                    // Get user email from Google
                    fetch("https://www.googleapis.com/oauth2/v2/userinfo",
                        { headers: { Authorization: "Bearer " + token } })
                        .then(r => r.json())
                        .then(info => {
                            const email = info.email || "unknown";
                            setUserEmail(email);
                            localStorage.setItem(LS_EMAIL_KEY, email);
                            localStorage.setItem(LS_MODE_KEY, "drive");
                            setAppMode("drive");
                            // Try to load existing Drive data
                            driveLoad().then(driveData => {
                                if (!driveData) {
                                    // No Drive file → upload current local data
                                    if (!isEmptyData(data) && !isSampleData(data)) {
                                        driveSave(data).then(() => { driveMarkSaved(); setSyncStatus("saved"); });
                                    }
                                    return;
                                }
                                if (driveData.version && driveData.version !== DATA_VERSION) {
                                    setSyncMsg("El archivo en Drive es de una versión anterior y no es compatible.");
                                    return;
                                }
                                const { version: _v, ...cleanDrive } = driveData;
                                cleanDrive.tareas = (cleanDrive.tareas || []).map(t => ({ items: [], obligatorio: true, ...t }));
                                cleanDrive.sesiones = cleanDrive.sesiones || [];
                                if (isEmptyData(data) || isSampleData(data) || fromWelcome) {
                                    // Local empty/sample → auto-load Drive
                                    setData(cleanDrive); lastExp.current = hashData(cleanDrive); setDirty(false);
                                } else {
                                    // Both have real data → conflict
                                    setDriveConflict({ driveData: cleanDrive, localData: data });
                                }
                            }).catch(() => { });
                        }).catch(() => {
                            setUserEmail(null);
                            localStorage.setItem(LS_MODE_KEY, "drive");
                            setAppMode("drive");
                        });
                });
            }

            const [resetConfirm, setResetConfirm] = useState(null);

                // Disconnect: revoke token, clear local data, back to welcome — no questions
                driveDisconnect();
                clearLS(userEmail);
                setDriveConnected(false); setSyncStatus("idle");
                setUserEmail(null);
                localStorage.removeItem(LS_EMAIL_KEY);
                localStorage.setItem(LS_MODE_KEY, "welcome");
                setAppMode("welcome");
                setData(EMPTY_DATA);
            }

            async function doResetEmpty() {
                // Clear local + Drive file, stay in planner with empty data
                clearLS(userEmail); clearLS(null);
                if (driveConnected && driveState.fileId) {
                    try {
                        await fetch(`https://www.googleapis.com/drive/v3/files/${driveState.fileId}`,
                            { method: "DELETE", headers: { Authorization: `Bearer ${driveState.accessToken}` } });
                        driveState.fileId = null;
                        localStorage.removeItem(LS_FILE_ID);
                    } catch (e) { }
                }
                setData(EMPTY_DATA);
                lastExp.current = hashData(EMPTY_DATA);
                setDirty(false);
                setResetModal(false); setResetConfirm(null);
            }

            function doResetSample() {
                // Reset to sample data, stay in planner
                clearLS(userEmail); clearLS(null);
                if (driveConnected && driveState.fileId) {
                    try {
                        fetch(`https://www.googleapis.com/drive/v3/files/${driveState.fileId}`,
                            { method: "DELETE", headers: { Authorization: `Bearer ${driveState.accessToken}` } });
                        driveState.fileId = null;
                        localStorage.removeItem(LS_FILE_ID);
                    } catch (e) { }
                }
                setData(SAMPLE);
                setIsDemo(false);
                lastExp.current = hashData(SAMPLE);
                setDirty(false);
                setResetModal(false); setResetConfirm(null);
            }
            function handleDriveSaveNow() {
                setSyncStatus("saving");
                driveSave(data)
                    .then(() => { driveMarkSaved(); setSyncStatus("saved"); setDirty(false); lastExp.current = hashData(data); })
                    .catch(err => { setSyncStatus("error"); setSyncMsg(err.message); });
            }
            async function handleDriveLoad() {
                try {
                    setSyncStatus("saving");
                    const p = await driveLoad();
                    if (!p.materias || !p.tareas) throw new Error("Formato inválido");
                    if (!p.tipos) p.tipos = DEFAULT_TIPOS;
                    if (!p.sesiones) p.sesiones = [];
                    p.tareas = p.tareas.map(t => ({ items: [], obligatorio: true, ...t }));
                    setData(p); lastExp.current = hashData(p); setDirty(false);
                    setImpErr(null); setSyncStatus("saved");
                } catch (err) { setImpErr(err.message); setSyncStatus("error"); setSyncMsg(err.message); }
            }
            function toggleAutoSave(v) {
                setAutoSave(v); localStorage.setItem("uai-autosave", v ? "true" : "false");
            }
            function editMateriaHoras(materiaId, horasMin, horasMax, slots) {
                setData(d => ({ ...d, materias: d.materias.map(m => m.id === materiaId ? { ...m, horasMin, horasMax, slots: slots || m.slots || [] } : m) }));
            }
            function saveManualSession(ses, quickTask) {
                setData(d => ({
                    ...d,
                    sesiones: [...(d.sesiones || []), ses],
                    tareas: quickTask ? [...d.tareas, quickTask] : d.tareas
                }));
                setManualSession(null);
            }
            function editSession(sessionId, patch) {
                setData(d => ({ ...d, sesiones: (d.sesiones || []).map(s => s.id === sessionId ? { ...s, ...patch } : s) }));
            }
            function deleteSession(sessionId) {
                setData(d => ({ ...d, sesiones: (d.sesiones || []).filter(s => s.id !== sessionId) }));
            }
            function enterLocal() {
                localStorage.setItem(LS_MODE_KEY, "local");
                setAppMode("local");
                if (!localStorage.getItem("uai-guia-vista")) setShowHelp(true);
                const saved = loadFromLS(null);
                if (saved) { setData(saved); lastExp.current = hashData(saved); }
                else { setData(EMPTY_DATA); lastExp.current = hashData(EMPTY_DATA); }
                setIsDemo(false);
            }
            function enterDemo() {
                setData(SAMPLE);
                setIsDemo(true);
                setAppMode("local"); // show the planner but don't save
            }
            function startPomoFromTask(task) {
                setPomoSession({ materiaId: task.materiaId, tareaId: task.id });
                setSelId(null);
            }
            function startPomoFromMateria(materia) {
                setPomoContext(materia);
            }
            function handlePomoContextStart(payload) {
                const { mode, tareaId, sessionTitle, quickTaskTitle } = payload || {};
                if (mode === "new") {
                    const quickTask = {
                        id: "qt" + Date.now(),
                        titulo: quickTaskTitle || "Nueva tarea rápida",
                        descripcion: "Tarea creada automáticamente desde sesión de estudio.",
                        materiaId: pomoContext.id,
                        tipo: (data.tipos || DEFAULT_TIPOS)[0]?.id || "entregable",
                        fechaLimite: new Date(Date.now() + 7 * 864e5).toISOString().slice(0, 10),
                        estado: "en_progreso",
                        obligatorio: false,
                        items: [],
                    };
                    setData(d => ({ ...d, tareas: [...d.tareas, quickTask] }));
                    setPomoSession({ materiaId: pomoContext.id, tareaId: quickTask.id, titulo: (sessionTitle || "").trim() });
                    setPomoContext(null);
                } else {
                    setPomoSession({
                        materiaId: pomoContext.id,
                        tareaId: mode === "none" ? null : tareaId,
                        titulo: (sessionTitle || "").trim()
                    });
                    setPomoContext(null);
                }
            }
            function stopPomo(minutos) {
                if (!pomoSession || minutos < 1) { setPomoSession(null); return; }
                const now = new Date();
                const localISO = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}T${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:00`;
                const ses = {
                    id: "s" + Date.now(), materiaId: pomoSession.materiaId, tareaId: pomoSession.tareaId,
                    inicio: localISO, minutos, origen: "timer", titulo: (pomoSession.titulo || "").trim()
                };
                setData(d => ({ ...d, sesiones: [...(d.sesiones || []), ses] }));
                setPomoSession(null);
            }
            function imp() {
                const inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
                inp.onchange = ev => {
                    const r = new FileReader();
                    r.onload = rv => {
                        try {
                            const p = JSON.parse(rv.target.result);
                            if (!p.materias || !p.tareas) throw new Error("Faltan 'materias' o 'tareas'");
                            if (!p.tipos) p.tipos = DEFAULT_TIPOS;
                            if (!p.sesiones) p.sesiones = [];
                            p.tareas = p.tareas.map(t => ({ items: [], obligatorio: true, ...t }));
                            setData(p); lastExp.current = hashData(p); setDirty(false); setImpErr(null);
                        } catch (err) { setImpErr(err.message); }
                    };
                    r.readAsText(ev.target.files[0]);
                };
                inp.click();
                // If importing from welcome, switch to local mode
                if (appMode === "welcome") { localStorage.setItem(LS_MODE_KEY, "local"); setAppMode("local"); }
            }
            function onExported() { lastExp.current = hashData(data); setDirty(false); }
            // materias visibles según filtro de año/período
            const materiasFiltradas = useMemo(() => data.materias.filter(m => {
                if (fAnio !== "all" && m.anio !== parseInt(fAnio)) return false;
                if (!fPeriodos.includes(m.periodo || "c1")) return false;
                return true;
            }), [data.materias, fAnio, fPeriodos]);
            const matIdsFiltradas = useMemo(() => new Set(materiasFiltradas.map(m => m.id)), [materiasFiltradas]);

            const filtered = useMemo(() => data.tareas.filter(t =>
                matIdsFiltradas.has(t.materiaId) &&
                (fm === "all" || t.materiaId === fm) &&
                (ft === "all" || t.tipo === ft) &&
                (fa === "all" || getAlertColor(t, alertas) !== null)
            ), [data.tareas, matIdsFiltradas, fm, ft, fa, alertas]);

            // años disponibles en los datos
            const aniosDisponibles = useMemo(() => [...new Set(data.materias.map(m => m.anio).filter(Boolean))].sort(), [data.materias]);
            const urgentTasks = useMemo(() => {
                return data.tareas.filter(t => getAlertColor(t, alertas) !== null);
            }, [data.tareas, alertas]);

            // Persist period filter changes
            useEffect(() => { localStorage.setItem("uai-filtro-anio", String(fAnio)); }, [fAnio]);
            useEffect(() => { localStorage.setItem("uai-filtro-periodos", JSON.stringify(fPeriodos)); }, [fPeriodos]);

            function togglePeriodo(pid) {
                setFPeriodos(prev => prev.includes(pid)
                    ? prev.length > 1 ? prev.filter(x => x !== pid) : prev  // no dejar vacío
                    : [...prev, pid]
                );
            }

            // Show welcome screen
            if (appMode === "welcome") {
                return e(WelcomeScreen, {
                    onLocal: enterLocal,
                    onDrive: () => handleDriveConnect(true),
                    onDemo: enterDemo,
                    expiredMsg: syncMsg && syncMsg.includes("expiró") ? syncMsg : null
                });
            }

            return e("div", { ref: appRef, className: "app " + (chromeExpanded ? "chrome-open" : "chrome-hidden") },
                e("div", {
                    ref: chromeShellRef,
                    className: "chrome-shell" + (chromeExpanded ? " open" : " collapsed"),
                    onMouseEnter: showChromeTemporarily,
                    onMouseLeave: scheduleChromeHide,
                    onFocus: showChromeTemporarily,
                    onBlur: (ev) => {
                        if (!ev.currentTarget.contains(ev.relatedTarget)) scheduleChromeHide();
                    }
                },
                    e("div", {
                        className: "chrome-panel"
                    },
                        e("header", { className: "hdr" },
                            e("button", {
                                className: "chrome-pin-btn" + (chromePinned ? " pin" : ""),
                                onClick: () => setChromePinned(v => !v),
                                title: chromePinned ? "Desfijar la barra" : "Fijar la barra"
                            }, chromePinned ? "📌" : "☰"),
                            e("span", { className: "logo" }, "◈ UAI Planner"),

                            e(PeriodoSelector, { anios: aniosDisponibles, fAnio, fPeriodos, setFAnio, togglePeriodo }),
                            e("nav", { className: "nav", style: { marginLeft: 24 } },
                                e("div", { style: { display: "flex", gap: 0, background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 7, padding: 3 } },
                                    [
                                        { v: "hoy", icon: "◈", label: "Hoy", short: "H" },
                                        { v: "semana", icon: "◈", label: "Semana", short: "S" },
                                        { v: "materias", icon: "◉", label: "Materias", short: "M" }
                                    ].map(({ v, icon, label, short }) =>
                                        e("button", { key: v, className: "nb " + (view === v ? "nba" : ""), onClick: () => setView(v), title: label },
                                            e("span", { className: "nb-ico", "aria-hidden": "true" }, icon),
                                            e("span", { className: "nb-label" }, label),
                                            e("span", { className: "nb-short" }, short)
                                        )
                                    )
                                ),
                                e("div", { style: { width: 16 } }),
                                e("div", { style: { display: "flex", gap: 0, background: "var(--bg2)", border: "1px solid var(--border)", borderRadius: 7, padding: 3 } },
                                    [
                                        { v: "backlog", icon: "≡", label: "Backlog", short: "B" },
                                        { v: "kanban", icon: "⬡", label: "Kanban", short: "K" },
                                        { v: "calendar", icon: "◷", label: "Calendario", short: "C" }
                                    ].map(({ v, icon, label, short }) =>
                                        e("button", { key: v, className: "nb " + (view === v ? "nba" : ""), onClick: () => setView(v), title: label },
                                            e("span", { className: "nb-ico", "aria-hidden": "true" }, icon),
                                            e("span", { className: "nb-label" }, label),
                                            e("span", { className: "nb-short" }, short)
                                        )
                                    ),
                                    e("div", { className: "nav-alert-wrap" },
                                        e("div", {
                                            className: "nav-alert-pill" + (urgentTasks.length === 0 ? " nav-alert-zero" : ""),
                                            title: urgentTasks.length === 0 ? "Sin alertas activas" : `${urgentTasks.length} alertas activas`
                                        },
                                            e("span", { className: "nav-alert-dot", "aria-hidden": "true" }),
                                            e("span", null, urgentTasks.length)
                                        )
                                    )
                                )
                            ),
                            e("div", { className: "hdr-btns" },
                                e("button", {
                                    className: "iconbtn",
                                    onClick: () => setShowHelp(true),
                                    title: "Guía de uso"
                                }, "?"),
                                e(ConfigBtn, { onOpenSettings: (tab) => setSettings(tab || "materias") }),
                                e(DatosBtn, {
                                    data, dirty, onExported, imp,
                                    driveConnected, syncStatus, autoSave, showSync,
                                    setShowSync, handleDriveConnect, handleDriveDisconnect,
                                    handleDriveSaveNow, handleDriveLoad, toggleAutoSave,
                                    onReset: () => setResetModal(true), userEmail
                                })
                            )
                        ),
                        impErr && e("div", { className: "errbanner" }, "⚠ " + impErr),
                        !["hoy", "semana", "materias"].includes(view) && e("div", { className: "fbar" },
                            e("select", { value: fm, onChange: ev => setFm(ev.target.value) },
                                e("option", { value: "all" }, "Todas las materias"),
                                materiasFiltradas.map(m => e("option", { key: m.id, value: m.id }, m.nombre + (periodoTag(m) ? " — " + periodoTag(m) : "")))
                            ),
                            e("select", { value: ft, onChange: ev => setFt(ev.target.value) },
                                e("option", { value: "all" }, "Todos los tipos"),
                                tipos.map(t => e("option", { key: t.id, value: t.id }, t.icon + " " + t.label))
                            ),
                            e("label", { className: "chklabel", style: { display: "inline-flex", alignItems: "center", gap: 8, padding: "0 10px", height: 36, border: "1px solid var(--line)", borderRadius: 10, background: "var(--card)" } },
                                e("input", { type: "checkbox", checked: fa === "only", onChange: ev => setFa(ev.target.checked ? "only" : "all") }),
                                e("span", null, "Solo alertas")
                            ),
                            e("span", { className: "cnt responsive-cnt" }, filtered.length + " tareas"),
                            e("div", { style: { display: "flex", gap: 8, marginLeft: "auto" } },
                                e("button", { className: "newbtn", onClick: () => setForm({}) },
                                    e("span", { className: "btn-full" }, "+ Nueva tarea"),
                                    e("span", { className: "btn-short" }, "+")
                                ),
                                e("button", { className: "importbtn", onClick: () => setImportTasksOpen(true) },
                                    e("span", { className: "btn-full" }, "↑ Importar tareas"),
                                    e("span", { className: "btn-short" }, "↑")
                                )
                            )
                        )
                    ),
                ),
                e("div", { className: "main" },
                    view === "hoy" && e(HoyView, {
                        materias: materiasFiltradas, sesiones: data.sesiones || [], tareas: data.tareas, isDark, onStartPomo: startPomoFromMateria, mmap, tmap, onEditObjetivos: setEditObjetivoM, franjas, onSaveFranjas: saveFranjas, onEditMateria: editMateriaHoras, urgentTasks,
                        onMoveSlot: (materiaId, fromDia, fromFid, toDia, toFid) => {
                            setData(d => ({
                                ...d, materias: d.materias.map(m => {
                                    if (m.id !== materiaId) return m;
                                    const slots = (m.slots || []).filter(s => !(s.dia === fromDia && s.momento === fromFid));
                                    if (!slots.some(s => s.dia === toDia && s.momento === toFid))
                                        slots.push({ dia: toDia, momento: toFid });
                                    return { ...m, slots };
                                })
                            }));
                        }
                    }),
                    view === "semana" && e(WeekView, {
                        materias: materiasFiltradas, isDark, onEditMateria: editMateriaHoras, onMoveSlot: (materiaId, fromDia, fromFid, toDia, toFid) => {
                            setData(d => ({
                                ...d, materias: d.materias.map(m => {
                                    if (m.id !== materiaId) return m;
                                    const slots = (m.slots || []).filter(s => !(s.dia === fromDia && s.momento === fromFid));
                                    if (!slots.some(s => s.dia === toDia && s.momento === toFid))
                                        slots.push({ dia: toDia, momento: toFid });
                                    return { ...m, slots };
                                })
                            }));
                        }, franjas
                    }),
                    view === "backlog" && e(Backlog, { tareas: filtered, mmap, tmap, isDark, move, onSel: id => setSelId(id) }),
                    view === "kanban" && e(Kanban, { tareas: filtered, mmap, tmap, isDark, move, onSel: id => setSelId(id) }),
                    view === "calendar" && e(Cal, { tareas: filtered, mmap, tmap, isDark, month: calM, setMonth: setCalM, onSel: id => setSelId(id), onMoveTask: moveTaskToDate, showInicio: calShowInicio, showFin: calShowFin, setShowInicio: setCalShowInicio, setShowFin: setCalShowFin }),
                    view === "materias" && e(MateriasView, { materias: materiasFiltradas, sesiones: data.sesiones || [], tareas: data.tareas, tmap, isDark, onStartPomo: startPomoFromMateria, onEditMateria: editMateriaHoras, onManualSession: setManualSession, onEditSession: editSession, onDeleteSession: deleteSession })
                ),
                sel && e(TaskModal, {
                    task: sel, mat: mmap[sel.materiaId], tipo: tmap[sel.tipo], isDark, move, toggleItem, onStartPomo: startPomoFromTask, sesiones: data.sesiones || [],
                    tareas: data.tareas,
                    onClose: () => setSelId(null), onEdit: () => { setForm(sel); setSelId(null); }, onDel: del,
                    onEditSession: editSession,
                    onDeleteSession: deleteSession
                }),
                form !== null && e(FormModal, { task: form, materias: data.materias, tipos, isDark, onSave: saveTask, onClose: () => setForm(null) }),
                settings && e(SettingsModal, {
                    data, setData, isDark,
                    themeId, setThemeId, appMode, userEmail, driveConnected,
                    onClose: () => setSettings(false),
                    onReset: () => setResetModal(true),
                    handleDriveConnect, handleDriveDisconnect,
                    initialTab: typeof settings === "string" ? settings : "materias",
                    franjas, franjaMode, onSaveFranjas: saveFranjas, onSaveFranjaMode: saveFranjaModeState,
                    alertas, onSaveAlertas: saveAlertasState
                }),
                importTasksOpen && e(ImportTasksModal, {
                    materias: data.materias,
                    tipos,
                    isDark,
                    onImport: saveImportedTasks,
                    onClose: () => setImportTasksOpen(false)
                }),
                e(UnsavedToast, { dirty, driveConnected, isDemo }),
                driveConflict && e(DriveConflictModal, {
                    conflict: driveConflict,
                    onUseDrive: () => {
                        const d = {
                            ...driveConflict.driveData,
                            tareas: (driveConflict.driveData.tareas || []).map(t => ({ items: [], obligatorio: true, ...t })),
                            sesiones: driveConflict.driveData.sesiones || []
                        };
                        setData(d); lastExp.current = hashData(d); setDirty(false); setDriveConflict(null);
                    },
                    onUseLocal: () => {
                        setDirty(true); setDriveConflict(null); // mark dirty so it uploads local to Drive
                    },
                    onClose: () => setDriveConflict(null)
                }),

                resetModal && e(ResetModal, {
                    driveConnected,
                    resetConfirm, setResetConfirm,
                    onResetEmpty: doResetEmpty,
                    onResetSample: doResetSample,
                    onClose: () => { setResetModal(false); setResetConfirm(null); }
                }),
                showHelp && e(HelpGuide, { onClose: closeHelp }),
                editObjetivoM && e("div", { className: "ov", onClick: () => setEditObjetivoM(null) },
                    e("div", { className: "mod", style: { maxWidth: 640 }, onClick: ev => ev.stopPropagation() },
                        e("div", { className: "mhd" },
                            e("div", { style: { width: 10, height: 10, borderRadius: "50%", background: editObjetivoM.color, flexShrink: 0, marginTop: 2 } }),
                            e("span", { className: "mtit" }, "Objetivos — " + editObjetivoM.nombre),
                            e("button", { className: "mclose", onClick: () => setEditObjetivoM(null) }, "✕")
                        ),
                        e("div", { className: "mbody" },
                            e(HorasEditor, {
                                m: editObjetivoM,
                                onSave: (minV, maxV, slots) => {
                                    editMateriaHoras(editObjetivoM.id, minV, maxV, slots);
                                    setEditObjetivoM(null);
                                },
                                onCancel: () => setEditObjetivoM(null)
                            })
                        )
                    )
                ),
                pomoContext && e(PomoContextPopup, { materia: pomoContext, tareas: data.tareas, tipos, onStart: handlePomoContextStart, onClose: () => setPomoContext(null) }),
                manualSession && e(ManualSessionModal, { materia: manualSession, tareas: data.tareas, onSave: saveManualSession, onClose: () => setManualSession(null) }),

                pomoSession && e(PomoWidget, { session: pomoSession, mmap, tmap, tareaObj: pomoSession.tareaId ? data.tareas.find(t => t.id === pomoSession.tareaId) : null, onStop: stopPomo, onCancel: () => setPomoSession(null), materias: data.materias, sesiones: data.sesiones || [] }),
                e(SchemaHint, null)
            );
        }

        /* ══════════════════════════════════════════════════════════════════════
           14. SCHEMA HINT (debug)
           ══════════════════════════════════════════════════════════════════════ */
        /* ─── SCHEMA HINT ── */
        function SchemaHint() {
            const [open, setOpen] = useState(false);
            const schema = `{
  "version": "1",
  "materias":  [{ "id","nombre","codigo","color":"#hex","anio":2026,"periodo":"c1|c2|anual" }],
  "tipos":     [{ "id","label","icon":"emoji","bg":"#hex","accent":"#hex" }],
  "tareas": [{
    "id","titulo","descripcion",
    "materiaId","tipo","fechaLimite":"YYYY-MM-DD",
    "estado":"pendiente|en_progreso|completado",
    "prioridad":"alta|media|baja",
    "items": [{ "id","label","done":true|false }]
  }]
}`;
            return e("div", { className: "hint" },
                e("button", { className: "hintbtn", onClick: () => setOpen(!open) }, (open ? "▲" : "▼") + " Formato JSON del importador"),
                open && e("pre", { className: "hintcode" }, schema)
            );
        }

        applyTheme(localStorage.getItem("uai-theme") || "hueso");
        ReactDOM.render(React.createElement(App), document.getElementById("root"));

    </script>
</body>

</html>
