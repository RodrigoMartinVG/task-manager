<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>◈ UAI Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
[data-theme="hueso"]{
  --bg0:#f0ece3;--bg1:#e8e3d8;--bg2:#dfd9cc;--bg3:#d5cec0;
  --border:#c4bcaf;--border2:#ada596;
  --text0:#28231c;--text1:#524c44;--text2:#6e665c;--text3:#8c8278;
  --accent:#4e47b8;--info-bg:#eae8f6;--info-text:#3930a0;
  --warn-bg:#f5e8cc;--warn-text:#7a4808;--warn-border:#b87830;
  --ok-bg:#daeee3;--ok-text:#146035;--ok-border:#4a9a68;
  --err-bg:#f2dcda;--err-text:#8c2018;--err-border:#c06060;
  --overlay:rgba(30,25,18,.55);--dark:0;
}
[data-theme="claro"]{
  --bg0:#f5f5f5;--bg1:#ffffff;--bg2:#eeeeee;--bg3:#e4e4e4;
  --border:#d8d8d8;--border2:#bbbbbb;
  --text0:#111111;--text1:#3a3a3a;--text2:#636363;--text3:#888888;
  --accent:#4040cc;--info-bg:#ededfa;--info-text:#2e2ea8;
  --warn-bg:#fff4d6;--warn-text:#704800;--warn-border:#c8900a;
  --ok-bg:#d6f5e3;--ok-text:#0f5030;--ok-border:#3a9060;
  --err-bg:#fce8e8;--err-text:#850000;--err-border:#cc4444;
  --overlay:rgba(0,0,0,.45);--dark:0;
}
[data-theme="noche"]{
  --bg0:#0e0e10;--bg1:#151517;--bg2:#1c1c1f;--bg3:#242428;
  --border:#2c2c30;--border2:#3a3a40;
  --text0:#ececec;--text1:#a8a8b0;--text2:#7a7a84;--text3:#60606a;
  --accent:#8880f0;--info-bg:#1e1c38;--info-text:#a8a0f8;
  --warn-bg:#281e08;--warn-text:#e0a030;--warn-border:#5a4010;
  --ok-bg:#0c2018;--ok-text:#40c878;--ok-border:#206040;
  --err-bg:#200c0c;--err-text:#f07070;--err-border:#602020;
  --overlay:rgba(0,0,0,.75);--dark:1;
}
[data-theme="pizarron"]{
  --bg0:#181c2e;--bg1:#1f2440;--bg2:#272c4c;--bg3:#303560;
  --border:#363c5e;--border2:#464e7a;
  --text0:#e8eaf8;--text1:#9ea8d0;--text2:#7a84b8;--text3:#7078a8;
  --accent:#a09cf8;--info-bg:#2a2858;--info-text:#c0bcff;
  --warn-bg:#2a220a;--warn-text:#f0c050;--warn-border:#604808;
  --ok-bg:#0e2820;--ok-text:#50e090;--ok-border:#1a6040;
  --err-bg:#280c10;--err-text:#f08080;--err-border:#602020;
  --overlay:rgba(5,8,24,.75);--dark:1;
}
[data-theme="cafe"]{
  --bg0:#1a1410;--bg1:#221a14;--bg2:#2c211a;--bg3:#362820;
  --border:#3e2e24;--border2:#503c30;
  --text0:#f0e8d8;--text1:#b09080;--text2:#8a7060;--text3:#907060;
  --accent:#c0a8f0;--info-bg:#2a1e38;--info-text:#d8c8ff;
  --warn-bg:#2a1c08;--warn-text:#f0b840;--warn-border:#604808;
  --ok-bg:#0c2010;--ok-text:#60d890;--ok-border:#1a5030;
  --err-bg:#280c08;--err-text:#f08878;--err-border:#602818;
  --overlay:rgba(10,6,4,.75);--dark:1;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;font-family:'DM Mono','Fira Code','Courier New',monospace;font-size:13px}
body{background:var(--bg0);color:var(--text0);transition:background .25s,color .25s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
select option{background:var(--bg1);color:var(--text0)}
input[type=date]::-webkit-calendar-picker-indicator{filter:brightness(.7);cursor:pointer}
input[type=color]{width:36px;height:28px;padding:2px;border:1px solid var(--border);border-radius:5px;cursor:pointer;background:var(--bg2)}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--accent)!important}
.app{display:flex;flex-direction:column;min-height:100vh}

.hdr{display:flex;align-items:center;gap:10px;padding:11px 22px;border-bottom:1px solid var(--border);background:var(--bg1);position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:700;color:var(--text0);letter-spacing:.05em;margin-right:4px}
.subtitle{font-size:10px;color:var(--text3);margin-right:auto}
.nav{display:flex;gap:0;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:3px;position:absolute;left:50%;transform:translateX(-50%)}
.nb{background:transparent;border:none;color:var(--text2);padding:5px 16px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;transition:all .18s;white-space:nowrap}
.nb:hover{color:var(--text0)}
.nba{background:var(--bg1);color:var(--text0);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.hdr-btns{display:flex;gap:5px;align-items:center}
.ibtn{background:transparent;border:1px solid var(--border2);color:var(--text1);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .15s}
.ibtn:hover{background:var(--bg2)}
.iconbtn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:5px 9px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:14px;line-height:1;transition:all .15s}
.iconbtn:hover{background:var(--bg2);color:var(--text0)}
.tsw-wrap{position:relative}
.tsw-btn{display:flex;align-items:center;gap:6px!important;font-size:12px!important}
.tsw-preview{width:12px;height:12px;border-radius:50%;flex-shrink:0;display:inline-block}
.tsw-popover{position:absolute;top:calc(100% + 8px);left:0;width:160px;background:var(--bg1);border:1px solid var(--border2);border-radius:9px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:500;overflow:hidden;padding:8px}
.tsw-pop-title{font-size:9px;color:var(--text3);letter-spacing:.1em;font-weight:600;padding:2px 6px 6px}
.tsw-option{display:flex;align-items:center;gap:8px;width:100%;background:transparent;border:none;color:var(--text1);padding:6px 8px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .12s}
.tsw-option:hover{background:var(--bg2);color:var(--text0)}
.tsw-option-active{background:var(--bg2);color:var(--text0);font-weight:500}
.tsw-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.exp-clean{background:transparent;border:1px solid var(--border);color:var(--text3);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;transition:all .3s}
.exp-clean:hover{background:var(--bg2);color:var(--text2)}
.exp-dirty{background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700;animation:pulse 2s ease-in-out infinite}
.exp-dirty:hover{opacity:.85}
.exp-saved{background:var(--ok-bg);border:1px solid var(--ok-border);color:var(--ok-text);padding:5px 13px;border-radius:5px;cursor:default;font-family:inherit;font-size:12px;font-weight:700}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 4px var(--warn-border)}}

.fbar{display:flex;align-items:center;gap:10px;padding:8px 22px;border-bottom:1px solid var(--border);background:var(--bg0);flex-wrap:wrap}
.fbar select{background:var(--bg1);border:1px solid var(--border);color:var(--text1);padding:5px 9px;border-radius:5px;font-family:inherit;font-size:12px;cursor:pointer}
.cnt{margin-left:auto;color:var(--text3);font-size:11px}
.newbtn{background:var(--info-bg);border:1px solid var(--accent);color:var(--info-text);padding:5px 13px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:700}
.newbtn:hover{opacity:.85}
.main{padding:18px 22px;max-width:1400px;margin:0 auto;width:100%}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;white-space:nowrap;letter-spacing:.04em}

/* ── PROGRESS BAR ── */
.ptrack{height:3px;background:var(--border);border-radius:2px;overflow:hidden;flex:1}
.ptrack-sm{height:3px}
.ptrack-md{height:5px}
.pbar{height:100%;border-radius:2px;transition:width .3s ease}
.prog-row{display:flex;align-items:center;gap:7px;margin-top:5px}
.prog-pct{font-size:10px;color:var(--text2);flex-shrink:0;width:28px;text-align:right}
.prog-frac{font-size:10px;color:var(--text3);flex-shrink:0}

/* ── BACKLOG ── */
.bl{display:flex;flex-direction:column;gap:5px}
.tr{display:flex;align-items:flex-start;gap:11px;padding:9px 12px;background:var(--bg1);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:all .12s}
.tr:hover{background:var(--bg2);border-color:var(--border2)}
.trb{width:3px;height:30px;border-radius:2px;flex-shrink:0;margin-top:2px}
.trc{flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;overflow:hidden}
.trt{font-size:13px;color:var(--text0);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trm{font-size:10px;color:var(--text3)}
.trmt{display:flex;align-items:center;gap:7px;flex-shrink:0;margin-top:2px}
.dl{font-size:11px;color:var(--text3);width:54px;text-align:right}
.ss{display:flex;gap:3px;flex-shrink:0;margin-top:2px}
.sb{background:transparent;border:1px solid var(--border);color:var(--text3);width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;padding:0;font-family:inherit;transition:all .1s}
.sb:hover{border-color:var(--border2);color:var(--text1)}
.sba{background:var(--bg2);color:var(--text0);border-color:var(--border2)}

/* ── KANBAN ── */
.kb{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.kc{background:var(--bg1);border:1px solid var(--border);border-radius:9px;padding:12px;display:flex;flex-direction:column}
.kh{display:flex;align-items:center;gap:7px;margin-bottom:11px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.kt{flex:1;font-size:12px;font-weight:600;color:var(--text0)}
.kcards{display:flex;flex-direction:column;gap:9px;flex:1}
.kcard{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:11px;cursor:pointer;transition:all .12s}
.kcard:hover{border-color:var(--border2);background:var(--bg3);transform:translateY(-1px)}
.kct{font-size:12px;color:var(--text0);font-weight:500;line-height:1.4;margin:6px 0 3px}
.kcd{font-size:10px;color:var(--text1);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.kab{background:transparent;border:1px solid var(--border2);color:var(--text1);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;width:100%;margin-top:9px;font-family:inherit;transition:all .12s}
.kab:hover{background:var(--bg1)}
.empty{text-align:center;color:var(--text3);padding:24px 0;font-size:11px}

/* ── CALENDAR ── */
.cal{background:var(--bg1);border:1px solid var(--border);border-radius:9px;overflow:hidden}
.calnav{display:flex;align-items:center;justify-content:space-between;padding:13px 17px;border-bottom:1px solid var(--border)}
.calnb{background:transparent;border:1px solid var(--border);color:var(--text1);width:30px;height:30px;border-radius:5px;cursor:pointer;font-size:16px;font-family:inherit;transition:all .12s}
.calnb:hover{background:var(--bg2)}
.calt{font-size:14px;font-weight:600;color:var(--text0);letter-spacing:.04em}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr)}
.cdn{text-align:center;padding:7px 2px 5px;font-size:10px;color:var(--text3);font-weight:600;letter-spacing:.1em;border-bottom:1px solid var(--border)}
.cce{min-height:86px}
.cc{min-height:86px;padding:5px 4px 4px;border-top:1px solid var(--border)}
.ccn{font-size:11px;color:var(--text3);display:block;text-align:right;margin-bottom:3px}
.ccn-today{color:var(--accent);font-weight:700}
.cc-today{border-top:1px solid var(--accent)!important}
.cchip{display:flex;flex-direction:column;gap:1px;padding:3px 5px;background:var(--bg2);border-radius:3px;font-size:9px;color:var(--text1);cursor:pointer;overflow:hidden;margin-bottom:2px;border-left:2px solid transparent;transition:background .1s}
.cchip:hover{background:var(--bg3)}
.cmore{font-size:9px;color:var(--text3);padding-left:5px}

/* ── MODALS ── */
.ov{position:fixed;inset:0;background:var(--overlay);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.mod{background:var(--bg1);border:1px solid var(--border2);border-radius:9px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.mod-wide{max-width:620px}
.mhd{display:flex;gap:12px;padding:17px 17px 13px;align-items:flex-start;border-bottom:1px solid var(--border)}
.mtit{flex:1;font-size:14px;font-weight:600;color:var(--text0);line-height:1.4}
.mclose{background:transparent;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:2px 5px;font-family:inherit}
.mclose:hover{color:var(--text0)}
.mbody{padding:14px 17px 17px}
.ibox{background:var(--bg2);border:1px solid var(--border);border-radius:5px;padding:9px 11px;display:flex;flex-direction:column;gap:3px}
.ilb{font-size:9px;color:var(--text3);letter-spacing:.08em}
.ivl{font-size:12px;color:var(--text0)}
.mab{flex:1;background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 7px;border-radius:5px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .12s}
.mab:hover{background:var(--bg2)}
.mab-a{background:var(--bg2);border-color:var(--border2);color:var(--text0)}
.miced{background:transparent;border:1px solid var(--border);color:var(--text2);width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .1s}
.miced:hover{color:var(--text0);border-color:var(--border2)}
.delbtn{background:transparent;border:1px solid var(--err-border);color:var(--err-text);padding:6px 12px;border-radius:5px;cursor:pointer;font-size:11px;width:100%;margin-top:5px;font-family:inherit;transition:all .12s}
.delbtn:hover{background:var(--err-bg)}
.cancbtn{background:transparent;border:1px solid var(--border);color:var(--text2);padding:6px 13px;border-radius:5px;cursor:pointer;font-size:12px;font-family:inherit;transition:all .12s}
.cancbtn:hover{background:var(--bg2)}
.savebtn{background:var(--info-bg);border:1px solid var(--accent);color:var(--info-text);padding:6px 15px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;transition:all .12s}
.savebtn:hover{opacity:.85}

/* ── CHECKLIST ── */
.chk-section{margin-bottom:14px}
.chk-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.chk-title{font-size:10px;color:var(--text3);letter-spacing:.08em}
.chk-list{display:flex;flex-direction:column;gap:5px}
.chk-item{display:flex;align-items:center;gap:9px;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all .12s;user-select:none}
.chk-item:hover{border-color:var(--border2)}
.chk-item-done{opacity:.55}
.chk-box{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:10px}
.chk-box-checked{background:var(--ok-bg);border-color:var(--ok-border);color:var(--ok-text)}
.chk-label{flex:1;font-size:12px;color:var(--text0);line-height:1.4}
.chk-label-done{text-decoration:line-through;color:var(--text2)}
.chk-empty{text-align:center;padding:12px;color:var(--text3);font-size:11px;border:1px dashed var(--border);border-radius:5px}

/* ── CHECKLIST EDITOR (form) ── */
.chk-edit-item{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.chk-edit-input{background:var(--bg2);border:1px solid var(--border);color:var(--text0);padding:5px 8px;border-radius:5px;font-family:inherit;font-size:12px;flex:1;transition:border .1s}
.chk-edit-input::placeholder{color:var(--text3)}
.chk-edit-input:focus{outline:none;border-color:var(--accent)}
.chk-add-btn{background:transparent;border:1px dashed var(--border2);color:var(--text2);padding:5px 10px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;width:100%;transition:all .12s;margin-top:3px}
.chk-add-btn:hover{background:var(--bg2);color:var(--text0)}

/* ── SETTINGS ── */
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.fl{font-size:10px;color:var(--text3);letter-spacing:.08em}
.fi{background:var(--bg2);border:1px solid var(--border);color:var(--text0);padding:7px 10px;border-radius:5px;font-family:inherit;font-size:12px;width:100%;transition:border .1s}
.fi::placeholder{color:var(--text3)}
textarea.fi{resize:vertical;height:58px}
.ferr{background:var(--err-bg);border:1px solid var(--err-border);color:var(--err-text);padding:7px 11px;border-radius:5px;font-size:11px;margin-bottom:11px}
.stabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:15px}
.stab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);padding:7px 17px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;margin-bottom:-1px;transition:all .15s}
.stab:hover{color:var(--text0)}
.stab-a{color:var(--accent);border-bottom-color:var(--accent)}
.slist{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.sitem{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:5px}
.sitem-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sitem-icon{font-size:15px;flex-shrink:0;width:22px;text-align:center}
.sitem-label{flex:1;font-size:12px;color:var(--text0);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sitem-sub{font-size:10px;color:var(--text2);flex-shrink:0}
.sitem-count{font-size:10px;color:var(--text3);flex-shrink:0;width:24px;text-align:center}
.sico{background:transparent;border:1px solid var(--border);color:var(--text2);width:24px;height:24px;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:inherit;transition:all .1s}
.sico:hover{color:var(--text0);border-color:var(--border2)}
.sico-del:hover{color:var(--err-text);border-color:var(--err-border);background:var(--err-bg)}
.sadd{background:transparent;border:1px dashed var(--border2);color:var(--text2);padding:7px 12px;border-radius:5px;cursor:pointer;font-family:inherit;font-size:11px;width:100%;transition:all .12s}
.sadd:hover{background:var(--bg2);color:var(--text0)}
.sinline{background:var(--bg0);border:1px solid var(--border);border-radius:5px;padding:12px;margin-bottom:10px}
.hint{border-top:1px solid var(--border);padding:10px 22px 16px;background:var(--bg0)}
.hintbtn{background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:0;font-family:inherit}
.hintbtn:hover{color:var(--text2)}
pre.hintcode{margin-top:10px;background:var(--bg1);border:1px solid var(--border);border-radius:5px;padding:13px;font-size:11px;color:var(--text2);line-height:1.6;overflow:auto}
.errbanner{background:var(--err-bg);border-bottom:1px solid var(--err-border);padding:7px 22px;color:var(--err-text);font-size:11px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--warn-bg);border:1px solid var(--warn-border);color:var(--warn-text);padding:10px 16px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:900;animation:toast-in .25s ease;white-space:nowrap}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-dismiss{background:transparent;border:none;color:var(--warn-text);cursor:pointer;font-family:inherit;font-size:11px;padding:2px 6px;border-radius:4px;border:1px solid var(--warn-border);opacity:.8;transition:opacity .12s}
.toast-dismiss:hover{opacity:1}
.toast-x{background:transparent;border:none;color:var(--warn-text);cursor:pointer;font-size:14px;padding:0 2px;opacity:.6;font-family:inherit}
.toast-x:hover{opacity:1}

  tokenExpiry: null,
  fileId: localStorage.getItem(LS_FILE_ID) || null,
};

function driveReady(){
  return typeof google !== "undefined" && !!google.accounts;
}

function driveInitTokenClient(callback){
  if(!driveReady()) return;
  driveState.tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GDRIVE_CLIENT_ID,
    scope: GDRIVE_SCOPE,
    callback: (resp) => {
      if(resp.error){ callback(null, resp.error); return; }
      driveState.accessToken = resp.access_token;
      driveState.tokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
      callback(resp.access_token, null);
    }
  });
}

function driveIsConnected(){
  return !!driveState.accessToken && Date.now() < (driveState.tokenExpiry||0);
}

function driveConnect(callback){
  if(!driveReady()){ callback(null,"Google no cargó todavía"); return; }
  driveInitTokenClient((token, err) => callback(token, err));
  driveState.tokenClient.requestAccessToken({prompt:"consent"});
}

function driveConnectSilent(callback){
  if(!driveReady()){ callback(null,"Google no disponible"); return; }
  driveInitTokenClient((token, err) => callback(token, err));
  driveState.tokenClient.requestAccessToken({prompt:""});
}

function driveDisconnect(){
  if(driveState.accessToken){
    google.accounts.oauth2.revoke(driveState.accessToken);
  }
  driveState.accessToken = null;
  driveState.tokenExpiry = null;
  driveState.fileId = null;
  localStorage.removeItem(LS_FILE_ID);
}

async function driveSave(jsonData){
  if(!driveIsConnected()) throw new Error("No conectado");
  const body = JSON.stringify(jsonData, null, 2);
  const meta = { name: GDRIVE_FILE_NAME, mimeType: "application/json" };

  if(driveState.fileId){
    // Update existing file
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify({mimeType:"application/json"})],{type:"application/json"}));
    form.append("file", new Blob([body],{type:"application/json"}));
    const res = await fetch(
      `https://www.googleapis.com/upload/drive/v3/files/${driveState.fileId}?uploadType=multipart`,
      { method:"PATCH", headers:{ Authorization:`Bearer ${driveState.accessToken}` }, body:form }
    );
    if(!res.ok) throw new Error("Error al actualizar en Drive: "+res.status);
    return driveState.fileId;
  } else {
    // Create new file
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(meta)],{type:"application/json"}));
    form.append("file", new Blob([body],{type:"application/json"}));
    const res = await fetch(
      "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart",
      { method:"POST", headers:{ Authorization:`Bearer ${driveState.accessToken}` }, body:form }
    );
    if(!res.ok) throw new Error("Error al crear en Drive: "+res.status);
    const json = await res.json();
    driveState.fileId = json.id;
    localStorage.setItem(LS_FILE_ID, json.id);
    return json.id;
  }
}

async function driveLoad(){
  if(!driveIsConnected()) throw new Error("No conectado");
  if(!driveState.fileId){
    // Search for existing file
    const res = await fetch(
      `https://www.googleapis.com/drive/v3/files?q=name='${GDRIVE_FILE_NAME}' and trashed=false&fields=files(id,name,modifiedTime)`,
      { headers:{ Authorization:`Bearer ${driveState.accessToken}` } }
    );
    const json = await res.json();
    if(!json.files?.length) throw new Error("No se encontró uai-planner.json en Drive");
    driveState.fileId = json.files[0].id;
    localStorage.setItem(LS_FILE_ID, driveState.fileId);
  }
  const res = await fetch(
    `https://www.googleapis.com/drive/v3/files/${driveState.fileId}?alt=media`,
    { headers:{ Authorization:`Bearer ${driveState.accessToken}` } }
  );
  if(!res.ok) throw new Error("Error al leer desde Drive: "+res.status);
  return res.json();
}

function driveSaveAsync(data, onStatus){
  onStatus("saving");
  driveSave(data)
    .then(()=>onStatus("saved"))
    .catch(err=>onStatus("error", err.message));
}

function driveLastSaved(){
  const ts = localStorage.getItem("uai-planner-last-saved");
  if(!ts) return null;
  const diff = Math.round((Date.now()-parseInt(ts))/1000);
  if(diff<60) return "hace "+diff+"s";
  if(diff<3600) return "hace "+Math.round(diff/60)+"min";
  return "hace "+Math.round(diff/3600)+"h";
}

function driveMarkSaved(){
  localStorage.setItem("uai-planner-last-saved", Date.now().toString());
}

const LS_NO_TOAST = "uai-planner-no-toast";

function UnsavedToast({dirty, driveConnected}){
  const [dismissed, setDismissed] = useState(()=>localStorage.getItem(LS_NO_TOAST)==="true");
  const [visible, setVisible] = useState(false);
  const hideTimer = useRef(null);

  useEffect(()=>{
    if(dismissed || driveConnected || !dirty){ setVisible(false); return; }
    setVisible(true);
    clearTimeout(hideTimer.current);
    hideTimer.current = setTimeout(()=>setVisible(false), 8000);
    return ()=>clearTimeout(hideTimer.current);
  },[dirty, driveConnected, dismissed]);

  if(!visible) return null;

  function closeTemp(){
    setVisible(false);
    clearTimeout(hideTimer.current);
  }
  function closePerm(){
    setVisible(false);
    setDismissed(true);
    localStorage.setItem(LS_NO_TOAST,"true");
  }

  return e("div",{className:"toast"},
    e("span",null,"● Tenés cambios sin guardar"),
    e("button",{className:"toast-dismiss",onClick:closePerm},"No volver a mostrar"),
    e("button",{className:"toast-x",onClick:closeTemp,title:"Cerrar"},"✕")
  );
}

function PeriodoSelector({anios,fAnio,fPeriodos,setFAnio,togglePeriodo}){
  const [open,setOpen]=useState(false);

  // Build label for button: "2026 · C1, Anual" etc
  const anioLabel=fAnio==="all"?"Todos":fAnio;
  const periodosLabel=fPeriodos.length===3?"Todos los períodos":fPeriodos.map(p=>p==="c1"?"C1":p==="c2"?"C2":"Anual").join(", ");

  return e("div",{className:"periodo-sel",style:{marginRight:"auto"}},
    e("button",{className:"iconbtn periodo-trigger",onClick:()=>setOpen(!open),title:"Filtrar por período"},
      "◷ ",
      e("span",{style:{color:"var(--text0)",fontWeight:500}},anioLabel),
      e("span",{style:{color:"var(--text2)",margin:"0 3px"}},"/"),
      e("span",{style:{color:"var(--text1)"}},periodosLabel)
    ),
    open&&e("div",{className:"periodo-popover"},
      // Año
      e("div",{className:"tsw-pop-title"},"AÑO"),
      e("div",{className:"periodo-pop-row"},
        e("button",{className:"periodo-pop-opt "+(fAnio==="all"?"periodo-pop-opt-on":""),onClick:()=>setFAnio("all")},"Todos",fAnio==="all"&&e("span",{style:{marginLeft:"auto",color:"var(--ok-text)"}},"✓")),
        anios.map(a=>e("button",{key:a,className:"periodo-pop-opt "+(fAnio===a||fAnio===String(a)?"periodo-pop-opt-on":""),onClick:()=>setFAnio(a)},String(a),( fAnio===a||fAnio===String(a))&&e("span",{style:{marginLeft:"auto",color:"var(--ok-text)"}},"✓")))
      ),
      e("div",{className:"sync-divider",style:{margin:"8px 0"}}),
      // Período (multi-select)
      e("div",{className:"tsw-pop-title"},"PERÍODO"),
      PERIODOS.map(p=>{
        const on=fPeriodos.includes(p.id);
        return e("button",{key:p.id,className:"periodo-pop-opt "+(on?"periodo-pop-opt-on":""),onClick:()=>togglePeriodo(p.id)},
          p.label,
          on&&e("span",{style:{marginLeft:"auto",color:"var(--ok-text)"}},"✓")
        );
      }),
      e("div",{style:{fontSize:10,color:"var(--text3)",padding:"6px 6px 0",textAlign:"center"}},"Podés seleccionar varios períodos")
    )
  );
}

/* ─── APP ── */
function App(){
  const saved=localStorage.getItem("uai-theme")||"hueso";
  const [themeId,setThemeId]=useState(saved);
  const [data,setData]=useState(SAMPLE);
  const [view,setView]=useState("backlog");
  const [fm,setFm]=useState("all");
  const [ft,setFt]=useState("all");
  const [calM,setCalM]=useState(new Date(2026,2,1));
  // store only the task ID so sel auto-updates when data changes
  const [selId,setSelId]=useState(null);
  const [form,setForm]=useState(null);
  const [settings,setSettings]=useState(false);
  const [fAnio,setFAnio]=useState("all");
  const [fPeriodos,setFPeriodos]=useState(["c1","c2","anual"]);
  // Drive state
  const [driveConnected,setDriveConnected]=useState(driveIsConnected());
  const [syncStatus,setSyncStatus]=useState("idle"); // idle | saving | saved | error
  const [syncMsg,setSyncMsg]=useState("");
  const [autoSave,setAutoSave]=useState(()=>localStorage.getItem("uai-autosave")==="true");
  const [showSync,setShowSync]=useState(false);
  const autoSaveTimer=useRef(null);
  // Pomodoro state
  const [pomoSession,setPomoSession]=useState(null);
  const [pomoContext,setPomoContext]=useState(null);
  const [manualSession,setManualSession]=useState(null);
  const [showManualSession,setShowManualSession]=useState(false);
  const [impErr,setImpErr]=useState(null);
  const lastExp=useRef(hashData(SAMPLE));
  const [dirty,setDirty]=useState(false);

  useEffect(()=>{applyTheme(themeId);},[themeId]);
  useEffect(()=>{setDirty(hashData(data)!==lastExp.current);},[data]);

  // Autosave debounce — fires 4s after last change, always on when Drive connected
  useEffect(()=>{
    if(!driveConnected||!dirty) return;
    clearTimeout(autoSaveTimer.current);
    autoSaveTimer.current=setTimeout(()=>{
      setSyncStatus("saving");
      driveSave(data)
        .then(()=>{ driveMarkSaved(); setSyncStatus("saved"); setDirty(false); lastExp.current=hashData(data); })
        .catch(err=>{ setSyncStatus("error"); setSyncMsg(err.message); });
    },4000);
    return ()=>clearTimeout(autoSaveTimer.current);
  },[data,driveConnected,dirty]);

  const themeObj=THEMES.find(t=>t.id===themeId)||THEMES[0];
  const isDark=themeObj.isDark;
  const mmap=useMemo(()=>Object.fromEntries(data.materias.map(m=>[m.id,m])),[data]);
  const tipos=data.tipos||DEFAULT_TIPOS;
  const tmap=useMemo(()=>Object.fromEntries(tipos.map(t=>[t.id,t])),[tipos]);

  // derive sel from data so it auto-updates on toggleItem
  const sel=selId?data.tareas.find(t=>t.id===selId)||null:null;

  function move(id,s){setData(d=>({...d,tareas:d.tareas.map(t=>t.id===id?{...t,estado:s}:t)}));}
  function toggleItem(taskId,itemId){
    setData(d=>({...d,tareas:d.tareas.map(t=>{
      if(t.id!==taskId)return t;
      return {...t,items:(t.items||[]).map(it=>it.id===itemId?{...it,done:!it.done}:it)};
    })}));
  }
  function saveTask(t){
    if(t.id)setData(d=>({...d,tareas:d.tareas.map(x=>x.id===t.id?t:x)}));
    else    setData(d=>({...d,tareas:[...d.tareas,{...t,id:"u"+Date.now()}]}));
    setForm(null);if(t.id)setSelId(t.id);
  }
  function del(id){setData(d=>({...d,tareas:d.tareas.filter(t=>t.id!==id)}));setSelId(null);}
  function handleDriveConnect(){
    driveConnect((token,err)=>{
      if(err){ setSyncMsg("Error al conectar: "+err); return; }
      setDriveConnected(true); setSyncStatus("idle");
      toggleAutoSave(true); // always autosave when connected
    });
  }
  function handleDriveDisconnect(){
    driveDisconnect(); setDriveConnected(false); setSyncStatus("idle");
  }
  function handleDriveSaveNow(){
    setSyncStatus("saving");
    driveSave(data)
      .then(()=>{ driveMarkSaved(); setSyncStatus("saved"); setDirty(false); lastExp.current=hashData(data); })
      .catch(err=>{ setSyncStatus("error"); setSyncMsg(err.message); });
  }
  async function handleDriveLoad(){
    try{
      setSyncStatus("saving");
      const p=await driveLoad();
      if(!p.materias||!p.tareas) throw new Error("Formato inválido");
      if(!p.tipos) p.tipos=DEFAULT_TIPOS;
      if(!p.sesiones) p.sesiones=[];
      p.tareas=p.tareas.map(t=>({items:[],obligatorio:true,...t}));
      setData(p); lastExp.current=hashData(p); setDirty(false);
      setImpErr(null); setSyncStatus("saved");
    }catch(err){ setImpErr(err.message); setSyncStatus("error"); setSyncMsg(err.message); }
  }
  function toggleAutoSave(v){
    setAutoSave(v); localStorage.setItem("uai-autosave",v?"true":"false");
  }
  function editMateriaHoras(materiaId, horasMin, horasMax){
    setData(d=>({...d,materias:d.materias.map(m=>m.id===materiaId?{...m,horasMin,horasMax}:m)}));
  }
  function saveManualSession(ses, quickTask){
    setData(d=>({
      ...d,
      sesiones:[...(d.sesiones||[]),ses],
      tareas:quickTask?[...d.tareas,quickTask]:d.tareas
    }));
    setManualSession(null);
  }
  function startPomoFromTask(task){
    setPomoSession({materiaId:task.materiaId,tareaId:task.id});
    setSelId(null);
  }
  function startPomoFromMateria(materia){
    setPomoContext(materia);
  }
  function handlePomoContextStart(tareaId, nuevaTituloTask){
    if(tareaId==="new"){
      // Create quick task automatically
      const quickTask={
        id:"qt"+Date.now(),
        titulo:nuevaTituloTask||`Sesión de estudio — ${pomoContext.nombre}`,
        descripcion:"Tarea creada automáticamente desde sesión de estudio.",
        materiaId:pomoContext.id,
        tipo:(data.tipos||DEFAULT_TIPOS)[0]?.id||"entregable",
        fechaLimite:new Date(Date.now()+7*864e5).toISOString().slice(0,10),
        estado:"en_progreso",
        obligatorio:false,
        items:[],
      };
      setData(d=>({...d,tareas:[...d.tareas,quickTask]}));
      setPomoSession({materiaId:pomoContext.id,tareaId:quickTask.id});
      setPomoContext(null);
    } else {
      setPomoSession({materiaId:pomoContext.id,tareaId:tareaId});
      setPomoContext(null);
    }
  }
  function stopPomo(minutos){
    if(!pomoSession||minutos<1){setPomoSession(null);return;}
    const now=new Date();
    const localISO=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}T${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:00`;
    const ses={id:"s"+Date.now(),materiaId:pomoSession.materiaId,tareaId:pomoSession.tareaId,
      inicio:localISO,minutos};
    setData(d=>({...d,sesiones:[...(d.sesiones||[]),ses]}));
    setPomoSession(null);
  }
  function imp(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=ev=>{
      const r=new FileReader();
      r.onload=rv=>{
        try{
          const p=JSON.parse(rv.target.result);
          if(!p.materias||!p.tareas)throw new Error("Faltan 'materias' o 'tareas'");
          if(!p.tipos)p.tipos=DEFAULT_TIPOS;
          if(!p.sesiones)p.sesiones=[];
          p.tareas=p.tareas.map(t=>({items:[],obligatorio:true,...t}));
          setData(p);lastExp.current=hashData(p);setDirty(false);setImpErr(null);
        }catch(err){setImpErr(err.message);}
      };
      r.readAsText(ev.target.files[0]);
    };
    inp.click();
  }
  function onExported(){lastExp.current=hashData(data);setDirty(false);}
  // materias visibles según filtro de año/período
  const materiasFiltradas=useMemo(()=>data.materias.filter(m=>{
    if(fAnio!=="all"&&m.anio!==parseInt(fAnio))return false;
    if(!fPeriodos.includes(m.periodo||"c1"))return false;
    return true;
  }),[data.materias,fAnio,fPeriodos]);
  const matIdsFiltradas=useMemo(()=>new Set(materiasFiltradas.map(m=>m.id)),[materiasFiltradas]);

  const filtered=useMemo(()=>data.tareas.filter(t=>
    matIdsFiltradas.has(t.materiaId)&&
    (fm==="all"||t.materiaId===fm)&&
    (ft==="all"||t.tipo===ft)
  ),[data.tareas,matIdsFiltradas,fm,ft]);

  // años disponibles en los datos
  const aniosDisponibles=useMemo(()=>[...new Set(data.materias.map(m=>m.anio).filter(Boolean))].sort(),[data.materias]);

  function togglePeriodo(pid){
    setFPeriodos(prev=>prev.includes(pid)
      ?prev.length>1?prev.filter(x=>x!==pid):prev  // no dejar vacío
      :[...prev,pid]
    );
  }

  return e("div",{className:"app"},
    e("header",{className:"hdr"},
      e("span",{className:"logo"},"◈ UAI Planner"),
      e(PeriodoSelector,{anios:aniosDisponibles,fAnio,fPeriodos,setFAnio,togglePeriodo}),
      e("nav",{className:"nav"},
        [["backlog","≡ Backlog"],["kanban","⬡ Kanban"],["calendar","◷ Calendario"],["materias","◉ Materias"]].map(([v,l])=>
          e("button",{key:v,className:"nb "+(view===v?"nba":""),onClick:()=>setView(v)},l)
        )
      ),
      e("div",{className:"hdr-btns"},
        e(ThemeSwitcher,{current:themeId,onChange:setThemeId}),
        e("button",{className:"iconbtn",onClick:()=>setSettings(true),title:"Configurar materias y tipos"},"⚙"),
        e(DatosBtn,{
          data,dirty,onExported,imp,
          driveConnected,syncStatus,syncMsg,showSync,
          setShowSync,handleDriveConnect,handleDriveDisconnect
        })
      )
    ),
    impErr&&e("div",{className:"errbanner"},"⚠ "+impErr),
    view!=="materias"&&e("div",{className:"fbar"},
      e("select",{value:fm,onChange:ev=>setFm(ev.target.value)},
        e("option",{value:"all"},"Todas las materias"),
        materiasFiltradas.map(m=>e("option",{key:m.id,value:m.id},m.nombre+(periodoTag(m)?" — "+periodoTag(m):"")))
      ),
      e("select",{value:ft,onChange:ev=>setFt(ev.target.value)},
        e("option",{value:"all"},"Todos los tipos"),
        tipos.map(t=>e("option",{key:t.id,value:t.id},t.icon+" "+t.label))
      ),
      e("span",{className:"cnt"},filtered.length+" tareas"),
      e("button",{className:"newbtn",onClick:()=>setForm({})},"+ Nueva tarea")
    ),
    e("div",{className:"main"},
      view==="backlog"  &&e(Backlog,  {tareas:filtered,mmap,tmap,isDark,move,onSel:id=>setSelId(id)}),
      view==="kanban"   &&e(Kanban,   {tareas:filtered,mmap,tmap,isDark,move,onSel:id=>setSelId(id)}),
      view==="calendar" &&e(Cal,      {tareas:filtered,mmap,tmap,isDark,month:calM,setMonth:setCalM,onSel:id=>setSelId(id)}),
      view==="materias" &&e(MateriasView,{materias:materiasFiltradas,sesiones:data.sesiones||[],tareas:data.tareas,tmap,isDark,onStartPomo:startPomoFromMateria,onEditMateria:editMateriaHoras,onManualSession:setManualSession})
    ),
    sel&&e(TaskModal,{task:sel,mat:mmap[sel.materiaId],tipo:tmap[sel.tipo],isDark,move,toggleItem,onStartPomo:startPomoFromTask,sesiones:data.sesiones||[],
      onClose:()=>setSelId(null),onEdit:()=>{setForm(sel);setSelId(null);},onDel:del}),
    form!==null&&e(FormModal,{task:form,materias:data.materias,tipos,isDark,onSave:saveTask,onClose:()=>setForm(null)}),
    settings&&e(SettingsModal,{data,setData,isDark,onClose:()=>setSettings(false)}),
    e(UnsavedToast,{dirty,driveConnected}),
    pomoContext&&e(PomoContextPopup,{materia:pomoContext,tareas:data.tareas,tipos,onStart:handlePomoContextStart,onClose:()=>setPomoContext(null)}),
    manualSession&&e(ManualSessionModal,{materia:manualSession,tareas:data.tareas,onSave:saveManualSession,onClose:()=>setManualSession(null)}),

    pomoSession&&e(PomoWidget,{session:pomoSession,mmap,tmap,tareaObj:pomoSession.tareaId?data.tareas.find(t=>t.id===pomoSession.tareaId):null,onStop:stopPomo,onCancel:()=>setPomoSession(null)}),
    e(SchemaHint,null)
  );
}

/* ─── BACKLOG ── */
function Backlog({tareas,mmap,tmap,isDark,move,onSel}){
  const fb={label:"?",icon:"•",bg:"var(--bg2)",accent:"var(--text2)"};
  const sorted=[...tareas].sort((a,b)=>{
    if(a.estado==="completado"&&b.estado!=="completado")return 1;
    if(b.estado==="completado"&&a.estado!=="completado")return-1;
    return new Date(a.fechaLimite)-new Date(b.fechaLimite);
  });
  return e("div",{className:"bl"},sorted.map(t=>{
    const m=mmap[t.materiaId],tp=tmap[t.tipo]||fb;
    const days=daysUntil(t.fechaLimite),u=urgColor(days,t.estado,isDark);
    const bs=badgeStyle(tp.bg,tp.accent,isDark);
    const pct=calcProgress(t);
    const items=t.items||[];
    const doneCount=items.filter(i=>i.done).length;
    return e("div",{key:t.id,className:"tr",style:{opacity:t.estado==="completado"?.5:1},onClick:()=>onSel(t.id)},
      e("div",{className:"trb",style:{background:m?.color||"var(--border2)"}}),
      e("span",{style:{fontSize:15,width:22,textAlign:"center",flexShrink:0,marginTop:1}},tp.icon),
      e("div",{className:"trc"},
        e("span",{className:"trt",style:{textDecoration:t.estado==="completado"?"line-through":"none"}},t.titulo),
        e("span",{className:"trm"},(m?.nombre||"")+(periodoTag(m)?" — "+periodoTag(m):""+(m?.codigo?" ("+m.codigo+")":""))),
        pct!==null&&e(ProgBar,{pct,isDark,size:"sm",showFrac:`${doneCount}/${items.length}`})
      ),
      e("div",{className:"trmt"},
        e("span",{className:"badge",style:bs},tp.label),
        t.obligatorio&&e("span",{className:"oblig-tag"},"🔴"),
        u&&e("span",{className:"badge",style:{background:"transparent",color:u,border:`1px solid ${u}55`}},
          t.estado==="completado"?"✓":days<0?`${Math.abs(days)}d venc.`:days===0?"Hoy":`${days}d`
        ),
        e("span",{className:"dl"},fd(t.fechaLimite))
      ),
      e("div",{className:"ss",onClick:ev=>ev.stopPropagation()},
        ESTADOS.map(s=>e("button",{key:s,className:"sb "+(t.estado===s?"sba":""),title:EL[s],onClick:()=>move(t.id,s)},
          s==="pendiente"?"○":s==="en_progreso"?"◑":"●"
        ))
      )
    );
  }));
}

/* ─── KANBAN ── */
function Kanban({tareas,mmap,tmap,isDark,move,onSel}){
  const fb={label:"?",icon:"•",bg:"var(--bg2)",accent:"var(--text2)"};
  const cols=[
    {k:"pendiente",  label:"Pendiente", dot:"○",c:isDark?"#a09cf8":"#4e47b8"},
    {k:"en_progreso",label:"En progreso",dot:"◑",c:isDark?"#e0a030":"#8f5510"},
    {k:"completado", label:"Completado",dot:"●",c:isDark?"#50d890":"#167a58"},
  ];
  return e("div",{className:"kb"},cols.map(col=>{
    const ct=tareas.filter(t=>t.estado===col.k).sort((a,b)=>new Date(a.fechaLimite)-new Date(b.fechaLimite));
    return e("div",{key:col.k,className:"kc"},
      e("div",{className:"kh"},
        e("span",{style:{color:col.c,fontSize:16}},col.dot),
        e("span",{className:"kt"},col.label),
        e("span",{className:"badge",style:{background:col.c+"22",color:col.c,border:`1px solid ${col.c}55`}},ct.length)
      ),
      e("div",{className:"kcards"},
        ct.length===0&&e("div",{className:"empty"},"sin tareas"),
        ct.map(t=>{
          const m=mmap[t.materiaId],tp=tmap[t.tipo]||fb;
          const days=daysUntil(t.fechaLimite),u=urgColor(days,t.estado,isDark);
          const bs=badgeStyle(tp.bg,tp.accent,isDark);
          const pct=calcProgress(t);
          const items=t.items||[];
          const doneCount=items.filter(i=>i.done).length;
          return e("div",{key:t.id,className:"kcard",onClick:()=>onSel(t.id)},
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
              e("span",{style:{fontSize:16}},tp.icon),
              e("span",{className:"badge",style:{...bs,fontSize:9}},tp.label)
            ),
            e("div",{className:"kct"},t.titulo),
            e("div",{className:"kcd"},t.descripcion),
            pct!==null&&e(ProgBar,{pct,isDark,size:"sm",showFrac:`${doneCount}/${items.length} ítems`}),
            e("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}},
              e("div",{style:{display:"flex",alignItems:"center",gap:5}},
                e("div",{style:{width:7,height:7,borderRadius:"50%",background:m?.color||"var(--border2)"}}),
                e("span",{style:{fontSize:10,color:"var(--text2)"}},m?(m.nombre+(periodoTag(m)?" · "+periodoTag(m):"")):"")  
              ),
              u&&e("span",{style:{fontSize:10,color:u}},fd(t.fechaLimite))
            ),
            col.k!=="completado"&&e("button",{className:"kab",onClick:ev=>{ev.stopPropagation();move(t.id,col.k==="pendiente"?"en_progreso":"completado");}},
              col.k==="pendiente"?"→ Iniciar":"✓ Completar"
            )
          );
        })
      )
    );
  }));
}

/* ─── CALENDAR ── */
function Cal({tareas,mmap,tmap,isDark,month,setMonth,onSel}){
  const y=month.getFullYear(),m=month.getMonth();
  const first=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const byDay=useMemo(()=>{
    const mp={};
    tareas.forEach(t=>{
      const d=new Date(t.fechaLimite+"T00:00:00");
      if(d.getFullYear()===y&&d.getMonth()===m){const k=d.getDate();if(!mp[k])mp[k]=[];mp[k].push(t);}
    });
    return mp;
  },[tareas,y,m]);
  const cells=[];for(let i=0;i<first;i++)cells.push(null);for(let d=1;d<=dim;d++)cells.push(d);
  return e("div",{className:"cal"},
    e("div",{className:"calnav"},
      e("button",{className:"calnb",onClick:()=>setMonth(new Date(y,m-1,1))},"‹"),
      e("span",{className:"calt"},MONTHS[m]+" "+y),
      e("button",{className:"calnb",onClick:()=>setMonth(new Date(y,m+1,1))},"›")
    ),
    e("div",{className:"calgrid"},
      DAYS.map(d=>e("div",{key:d,className:"cdn"},d)),
      cells.map((day,i)=>{
        if(!day)return e("div",{key:"e"+i,className:"cce"});
        const ct=byDay[day]||[],isToday=new Date(y,m,day).getTime()===today.getTime();
        return e("div",{key:day,className:"cc "+(isToday?"cc-today":"")},
          e("span",{className:"ccn "+(isToday?"ccn-today":"")},day),
          ct.slice(0,3).map(t=>{
            const mat=mmap[t.materiaId],tp=tmap[t.tipo];
            const pct=calcProgress(t);
            const color=pct!==null?progressColor(pct,isDark):null;
            return e("div",{key:t.id,className:"cchip",
              style:{
                borderLeftColor:mat?.color||"var(--border2)",
                background:mat?(mat.color+"28"):"var(--bg2)",
                opacity:t.estado==="completado"?.4:1
              },
              onClick:()=>onSel(t.id)},
              e("div",{style:{display:"flex",alignItems:"center",gap:3,overflow:"hidden"}},
                e("span",{style:{fontSize:10,flexShrink:0}},tp?.icon||"•"),
                e("span",{style:{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,
                  fontWeight:500,color:"var(--text0)"}},t.titulo)
              ),
              mat&&e("span",{style:{fontSize:8,color:mat.color,overflow:"hidden",

/* ─── POMODORO FOCUS MODE ── */
function PomoWidget({session,mmap,tareaObj,onStop,onCancel}){
  const [studySecs,setStudySecs]=useState(0);
  const [pauseSecs,setPauseSecs]=useState(0);
  const [paused,setPaused]=useState(false);
  const studyRef=useRef(null);
  const pauseRef=useRef(null);
  const studyAccum=useRef(0); // accumulated study seconds before pause

  useEffect(()=>{
    studyRef.current=setInterval(()=>{
      if(!paused) setStudySecs(s=>s+1);
    },1000);
    return()=>clearInterval(studyRef.current);
  },[paused]);

  useEffect(()=>{
    clearInterval(pauseRef.current);
    if(paused){
      pauseRef.current=setInterval(()=>setPauseSecs(s=>s+1),1000);
    } else {
      setPauseSecs(0);
    }
    return()=>clearInterval(pauseRef.current);
  },[paused]);

  const mat=mmap[session.materiaId];
  function fmt(n){return String(n).padStart(2,"0");}
  function fmtSecs(s){
    return`${fmt(Math.floor(s/3600))}:${fmt(Math.floor((s%3600)/60))}:${fmt(s%60)}`;
  }

  return e("div",{className:"pomo-focus-overlay"},
    e("div",{className:"pomo-focus-card"},

      // Status badge
      e("div",{className:"pomo-status-badge "+(paused?"pomo-status-paused":"pomo-status-active")},
        paused?"◎ EN PAUSA":"◉ EN SESIÓN"
      ),

      // Materia + tarea
      e("div",{style:{textAlign:"center",marginBottom:32}},
        e("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:8}},
          e("div",{style:{width:12,height:12,borderRadius:"50%",background:mat?.color||"var(--accent)",flexShrink:0}}),
          e("div",{style:{fontSize:18,fontWeight:600,color:"var(--text0)"}},mat?.nombre||"")
        ),
        tareaObj
          ?e("div",{style:{fontSize:13,color:"var(--text2)",maxWidth:340,margin:"0 auto"}},tareaObj.titulo)
          :e("div",{style:{fontSize:12,color:"var(--text3)"}},"Sin tarea específica")
      ),

      // Main study timer
      e("div",{className:"pomo-focus-timer "+(paused?"pomo-timer-paused":"")},
        fmtSecs(studySecs)
      ),

      // Pause timer (only when paused)
      paused
        ? e("div",{style:{textAlign:"center",marginBottom:28}},
            e("div",{style:{fontSize:11,color:"var(--text3)",letterSpacing:".06em",marginBottom:4}},"TIEMPO DE PAUSA"),
            e("div",{style:{fontSize:26,fontWeight:600,color:"var(--warn-text)",fontVariantNumeric:"tabular-nums"}},
              fmtSecs(pauseSecs)
            )
          )
        : e("div",{style:{height:60}}),

      // Actions
      e("div",{className:"pomo-focus-actions"},
        e("button",{className:"pomo-action-btn pomo-btn-pause",onClick:()=>setPaused(p=>!p)},
          paused?"▶ Retomar":"⏸ Pausar"
        ),
        e("button",{className:"pomo-action-btn pomo-btn-stop",onClick:()=>onStop(Math.round(studySecs/60))},
          "⏹ Terminar y guardar"
        )
      ),
      e("button",{className:"pomo-cancel-link",onClick:onCancel},"✕ Cancelar sin guardar")
    )
  );
}

function ManualSessionModal({materia,tareas,onSave,onClose}){
  function localDate(){

    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function localTime(){
    const d=new Date();
    return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }
  const [f,setF]=useState({
    tareaId:"none",

    horas:1,minutos:0,

    hora:localTime()

      ),

        e("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",
          background:"var(--bg2)",borderRadius:5,marginBottom:14,borderLeft:`3px solid ${materia.color}`}},
          e("span",{style:{fontSize:12,color:"var(--text0)",fontWeight:500}},materia.nombre)
        ),

        e("div",{className:"fg"},
          e("label",{className:"fl"},"TAREA (OPCIONAL)"),
          e("select",{className:"fi",value:f.tareaId,onChange:ev=>s("tareaId",ev.target.value)},
            e("option",{value:"none"},"Sin tarea específica"),
            tareasM.map(t=>e("option",{key:t.id,value:t.id},t.titulo))
          )
        ),
        f.tareaId==="none"&&e("div",{className:"fg"},

/* ─── MATERIAS VIEW ── */
function MateriasView({materias,sesiones,tareas,tmap,isDark,onStartPomo,onEditMateria,onManualSession}){
  const [selId,setSelId]=useState(null);
  const sel=materias.find(m=>m.id===selId)||null;
  function toggleSel(id){setSelId(prev=>prev===id?null:id);}

  function getWeekStart(){
    const d=new Date();d.setHours(0,0,0,0);
    d.setDate(d.getDate()-((d.getDay()+6)%7));
    return d;
  }
  const weekStart=useMemo(()=>getWeekStart(),[]);
  const minsSemana=useMemo(()=>{
    const mp={};
    sesiones.forEach(s=>{if(new Date(s.inicio)>=weekStart)mp[s.materiaId]=(mp[s.materiaId]||0)+s.minutos;});
    return mp;
  },[sesiones,weekStart]);

  function semaforo(m){
    const hs=(minsSemana[m.id]||0)/60;
    if(!m.horasMin&&!m.horasMax)return"gray";
    if(hs>=(m.horasMax||0))return"green";
    if(hs>=(m.horasMin||0))return"yellow";
    return"red";
  }
  const semColor={red:"#e74c3c",yellow:"#e0a030",green:"#27ae60",gray:"#888"};

  return e("div",{style:{paddingBottom:32}},
    // Header labels
    e("div",{style:{display:"flex",alignItems:"center",gap:12,padding:"4px 14px",
      fontSize:9,color:"var(--text3)",letterSpacing:".08em",fontWeight:600,marginBottom:4}},
      e("span",{style:{width:9,flexShrink:0}}),
      e("span",{style:{flex:1}},"MATERIA"),
      e("span",{style:{width:180,textAlign:"center"}},"ESTA SEMANA"),
      e("span",{style:{width:80,textAlign:"right"}},"ESTADO"),
      e("span",{style:{width:22}})
    ),

    // Each materia as standalone block
    materias.map(m=>{
      const mins=minsSemana[m.id]||0;
      const hs=parseFloat((mins/60).toFixed(1));
      const minH=m.horasMin||0,maxH=m.horasMax||0;
      const pct=maxH?Math.min(100,Math.round(hs/maxH*100)):0;
      const minPct=maxH&&minH?Math.round(minH/maxH*100):0;
      const sem=semaforo(m);
      const c=semColor[sem];
      const isActive=selId===m.id;
      const tag=periodoTag(m);

      return e("div",{key:m.id,
        style:{marginBottom:8}},

        // Row
        e("div",{
          onClick:()=>toggleSel(m.id),
          style:{
            display:"flex",alignItems:"center",gap:12,padding:"11px 14px",
            background:"var(--bg1)",
            border:"1px solid "+(isActive?"var(--accent)":"var(--border)"),
            borderRadius:isActive?"7px 7px 0 0":"7px",
            borderBottom:isActive?"none":"1px solid "+(isActive?"var(--accent)":"var(--border)"),
            cursor:"pointer",
            transition:"all .15s",
          }},
          // Dot
          e("div",{style:{width:9,height:9,borderRadius:"50%",background:c,flexShrink:0}}),
          // Name + code
          e("div",{style:{flex:1,minWidth:0}},
            e("div",{style:{fontSize:13,fontWeight:isActive?600:400,color:"var(--text0)",
              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},m.nombre),
            e("div",{style:{fontSize:10,color:"var(--text3)"}},m.codigo+(tag?" · "+tag:""))
          ),
          // Progress bar + hours (hidden when expanded)
          !isActive&&e("div",{style:{width:180,display:"flex",alignItems:"center",gap:8}},
            e("div",{style:{flex:1,height:6,background:"var(--border)",borderRadius:3,
              position:"relative",overflow:"visible"}},
              e("div",{style:{position:"absolute",inset:0,overflow:"hidden",borderRadius:3}},
                e("div",{style:{height:"100%",width:pct+"%",background:c,borderRadius:3,transition:"width .4s"}})
              ),
              minH>0&&maxH>0&&e("div",{style:{
                position:"absolute",top:-2,left:minPct+"%",
                width:2,height:10,background:"var(--text2)",borderRadius:1,
                transform:"translateX(-50%)",zIndex:2
              }})
            ),
            e("span",{style:{fontSize:11,color:c,fontWeight:600,minWidth:32,textAlign:"right"}},hs+"h")
          ),
          isActive&&e("div",{style:{width:180}}),
          // Status
          !isActive&&e("div",{style:{width:80,fontSize:10,color:c,textAlign:"right",paddingRight:4}},
            sem==="red"?"↓ mín "+minH+"h":
            sem==="yellow"?minH+"–"+maxH+"h ✓":
            sem==="green"?"≥ "+maxH+"h ✓":"—"
          ),
          isActive&&e("div",{style:{width:80}}),
          // Chevron
          e("span",{style:{width:22,textAlign:"center",fontSize:11,
            color:isActive?"var(--accent)":"var(--text3)",
            display:"inline-block",
            transform:isActive?"rotate(90deg)":"rotate(0deg)",
            transition:"transform .2s"
          }},"▶")
        ),

        // Expanded detail panel
        isActive&&e("div",{style:{
          background:"var(--bg1)",
          border:"1px solid var(--accent)",
          borderTop:"none",
          borderRadius:"0 0 7px 7px",
          overflow:"hidden"
        }},
          e(MateriasDetail,{
            m,
            sesiones:sesiones.filter(s=>s.materiaId===m.id),
            tareas:tareas.filter(t=>t.materiaId===m.id),
            isDark,
            onStartPomo,
            onEditMateria,
            onManualSession,
            onClose:()=>setSelId(null)
          })
        )
      );
    })
  );
}

/* ─── MATERIAS DETAIL ── */
function MateriasDetail({m,sesiones,tareas,isDark,onStartPomo,onEditMateria,onManualSession,onClose}){
  const PERIODOS_VIS=[
    {id:"semana",label:"Esta semana",semanas:1},
    {id:"2sem",label:"2 semanas",semanas:2},
    {id:"4sem",label:"4 semanas",semanas:4},
    {id:"custom",label:"Personalizado",semanas:null},
  ];
  const [pv,setPv]=useState("semana");
  const [desde,setDesde]=useState(()=>{
    const d=new Date();d.setDate(d.getDate()-14);return d.toISOString().slice(0,10);
  });
  const [hasta,setHasta]=useState(new Date().toISOString().slice(0,10));
  const [editingHoras,setEditingHoras]=useState(false);

  function getMondayBefore(dateStr){
    const d=new Date(dateStr+"T00:00:00");
    d.setDate(d.getDate()-((d.getDay()+6)%7));
    d.setHours(0,0,0,0);
    return d;
  }
  function getRange(){
    const now=new Date();now.setHours(23,59,59,999);
    if(pv==="custom") return {start:new Date(desde+"T00:00:00"),end:new Date(hasta+"T23:59:59")};
    const pvObj=PERIODOS_VIS.find(p=>p.id===pv);
    const sems=pvObj?.semanas||1;
    const start=getMondayBefore(new Date().toISOString().slice(0,10));
    if(sems>1) start.setDate(start.getDate()-(sems-1)*7);
    return {start,end:now};
  }
  // Compute range and filter sesiones in one memo so sesiones changes always trigger update
  const {range,sesInRange}=useMemo(()=>{
    const r=getRange();
    return {range:r,sesInRange:sesiones.filter(s=>{const d=new Date(s.inicio);return d>=r.start&&d<=r.end;})};
  },[sesiones,pv,desde,hasta]);

  const totalMins=sesInRange.reduce((a,s)=>a+s.minutos,0);
  const totalHs=parseFloat((totalMins/60).toFixed(1));

  // Count full weeks in range
  const msRange=range.end-range.start;
  const semsCount=Math.max(1,Math.round(msRange/(7*864e5)));
  const promHs=parseFloat((totalHs/semsCount).toFixed(1));

  // Scaled objectives
  const pvObj=PERIODOS_VIS.find(p=>p.id===pv);
  const factor=pv==="semana"?1:pv==="custom"?semsCount:pvObj?.semanas||1;
  const minEsc=(m.horasMin||0)*factor;
  const maxEsc=(m.horasMax||0)*factor;

  // Progress
  const pct=maxEsc?Math.min(100,Math.round(totalHs/maxEsc*100)):0;
  const minPct=maxEsc&&minEsc?Math.round(minEsc/maxEsc*100):0;
  const sem=!minEsc&&!maxEsc?"gray":totalHs>=maxEsc?"green":totalHs>=minEsc?"yellow":"red";
  const semColor={red:"var(--err-text)",yellow:"var(--warn-text)",green:"var(--ok-text)",gray:"var(--text3)"};
  const c=semColor[sem];

  function fmtH(mins){
    const h=Math.floor(mins/60),mn=mins%60;
    if(!mins)return"0h";
    return h>0?(mn>0?`${h}h ${mn}min`:`${h}h`):`${mn}min`;
  }
  function fmtDate(iso){
    const d=new Date(iso);
    return`${d.getDate()} ${['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'][d.getMonth()]} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  const tarPend=tareas.filter(t=>t.estado!=="completado");
  const obligs=tarPend.filter(t=>t.obligatorio).length;

  return e("div",{className:"mat-detail"},
    // Action bar
    e("div",{style:{display:"flex",alignItems:"center",gap:8,padding:"10px 18px",
      borderBottom:"1px solid var(--border)"}},
      e("button",{className:"ibtn",style:{fontSize:11,padding:"4px 10px"},
        onClick:()=>setEditingHoras(!editingHoras)},
        editingHoras?"✕ Cerrar":"✎ Objetivos"),
      e("button",{className:"ibtn",style:{fontSize:11,padding:"4px 10px"},
        onClick:()=>{if(onManualSession)onManualSession(m);}},
        "+ Cargar horas"),
      e("div",{style:{flex:1}}),
      e("button",{className:"pomo-start-mat-btn",
        style:{padding:"5px 16px",borderColor:m.color+"66",color:m.color,
          borderRadius:5,fontSize:12,width:"auto"},
        onClick:()=>onStartPomo(m)},"▶ Iniciar sesión")
    ),

    e("div",{style:{padding:"0 18px 18px"}},
    // Horas editor popup
    editingHoras&&e("div",{className:"ov",onClick:()=>setEditingHoras(false)},
      e("div",{className:"mod",style:{maxWidth:340},onClick:ev=>ev.stopPropagation()},
        e("div",{className:"mhd"},
          e("div",{style:{width:10,height:10,borderRadius:"50%",background:m.color,flexShrink:0,marginTop:2}}),
          e("span",{className:"mtit"},"Objetivos semanales — "+m.nombre),
          e("button",{className:"mclose",onClick:()=>setEditingHoras(false)},"✕")
        ),
        e("div",{className:"mbody"},
          e(HorasEditor,{m,
            onSave:(minV,maxV)=>{onEditMateria(m.id,minV,maxV);setEditingHoras(false);},
            onCancel:()=>setEditingHoras(false)
          })
        )
      )
    ),

    // Period selector
    e("div",{style:{display:"flex",gap:3,background:"var(--bg2)",border:"1px solid var(--border)",
      borderRadius:6,padding:3,marginBottom:16,alignSelf:"flex-start",flexWrap:"wrap"}},
      PERIODOS_VIS.map(p=>e("button",{key:p.id,
        style:{background:pv===p.id?"var(--bg1)":"transparent",border:"none",
          color:pv===p.id?"var(--text0)":"var(--text2)",padding:"4px 12px",borderRadius:4,
          cursor:"pointer",fontFamily:"inherit",fontSize:11,
          fontWeight:pv===p.id?500:400,
          boxShadow:pv===p.id?"0 1px 3px rgba(0,0,0,.1)":"none",transition:"all .15s"},
        onClick:()=>setPv(p.id)},p.label))
    ),

    // Custom date range
    pv==="custom"&&e("div",{style:{display:"flex",gap:8,alignItems:"center",marginBottom:16}},
      e("label",{className:"fl"},"DESDE"),
      e("input",{className:"fi",type:"date",value:desde,onChange:ev=>setDesde(ev.target.value),style:{width:140}}),
      e("label",{className:"fl",style:{marginLeft:8}},"HASTA"),
      e("input",{className:"fi",type:"date",value:hasta,onChange:ev=>setHasta(ev.target.value),style:{width:140}})
    ),

    // Big metrics
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:16}},
      e("div",{className:"ibox"},
        e("span",{className:"ilb"},"TOTAL DEDICADO"),
        e("span",{style:{fontSize:22,fontWeight:700,color:c,marginTop:2}},totalHs+"h"),
        e("span",{className:"ilb"},fmtH(totalMins))
      ),
      e("div",{className:"ibox"},
        e("span",{className:"ilb"},"PROMEDIO / SEMANA"),
        e("span",{style:{fontSize:22,fontWeight:700,color:pv==="semana"?"var(--text3)":promHs>=(m.horasMin||0)?c:"var(--err-text)",marginTop:2}},
          pv==="semana"?"—":promHs+"h"),
        pv!=="semana"&&e("span",{className:"ilb"},"objetivo: "+(m.horasMin||0)+"–"+(m.horasMax||0)+"h")
      ),
      e("div",{className:"ibox"},
        e("span",{className:"ilb"},"OBJETIVO ("+factor+" sem)"),
        e("span",{style:{fontSize:22,fontWeight:700,color:"var(--text1)",marginTop:2}},minEsc+"–"+maxEsc+"h"),
        e("span",{className:"ilb"},minEsc?"base: "+(m.horasMin||0)+"h/sem":"sin configurar")
      )
    ),

    // Progress bar
    (minEsc||maxEsc)&&e("div",{style:{marginBottom:16}},
      e("div",{style:{position:"relative",height:10,background:"var(--border)",borderRadius:5,overflow:"visible",marginBottom:6}},
        e("div",{style:{position:"absolute",inset:0,overflow:"hidden",borderRadius:5}},
          e("div",{style:{height:"100%",width:pct+"%",background:c,borderRadius:5,transition:"width .4s ease"}})
        ),
        minEsc>0&&maxEsc>0&&e("div",{style:{position:"absolute",top:-4,left:minPct+"%",
          width:2,height:18,background:"var(--text1)",borderRadius:1,transform:"translateX(-50%)",zIndex:2}})
      ),
      e("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text3)",marginBottom:4}},
        e("span","0h"),
        minEsc>0&&e("span",{style:{color:"var(--text2)"}},"mín "+minEsc+"h"),
        maxEsc>0&&e("span","máx "+maxEsc+"h")
      ),
      e("div",{style:{fontSize:12,color:c,fontWeight:500}},
        sem==="red"&&`Por debajo del mínimo — faltan ${Math.max(0,(minEsc-totalHs)).toFixed(1)}h`,
        sem==="yellow"&&`En zona saludable — faltan ${Math.max(0,(maxEsc-totalHs)).toFixed(1)}h para el máximo`,
        sem==="green"&&"Objetivo alcanzado ✓",
        sem==="gray"&&"Sin objetivo configurado"
      )
    ),

    // Tasks summary
    tarPend.length>0&&e("div",{style:{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}},
      obligs>0&&e("span",{className:"badge",style:{background:"var(--err-bg)",color:"var(--err-text)"}},`🔴 ${obligs} obligatoria${obligs>1?"s":""}`),
      e("span",{className:"badge",style:{background:"var(--bg2)",color:"var(--text2)"}},`${tarPend.length} tarea${tarPend.length>1?"s":""} pendiente${tarPend.length>1?"s":""}`)
    ),

    // Sessions history
    sesInRange.length>0&&e("div",null,
      e("div",{className:"fl",style:{marginBottom:8,display:"block"}},`SESIONES EN EL PERÍODO (${sesInRange.length})`),
      e("div",{style:{display:"flex",flexDirection:"column",gap:5}},
        [...sesInRange].sort((a,b)=>new Date(b.inicio)-new Date(a.inicio)).map(s=>{
          const tar=tareas.find(t=>t.id===s.tareaId);
          const hm=Math.floor(s.minutos/60),mm=s.minutos%60;
          const dur=hm>0?(mm>0?`${hm}h ${mm}m`:`${hm}h`):`${mm}m`;
          return e("div",{key:s.id,style:{display:"flex",alignItems:"center",gap:10,
            padding:"7px 11px",background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:6}},
            e("span",{style:{flex:1,fontSize:11,color:"var(--text1)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},
              tar?tar.titulo:"Sin tarea específica"),
            e("span",{style:{fontSize:11,color:"var(--ok-text)",fontWeight:600,flexShrink:0}},dur),
            e("span",{style:{fontSize:10,color:"var(--text3)",flexShrink:0,marginLeft:4}},fmtDate(s.inicio))
          );
        })
      )
    ),
    sesInRange.length===0&&e("div",{style:{fontSize:12,color:"var(--text3)",textAlign:"center",
      padding:"20px",background:"var(--bg2)",borderRadius:6}},"Sin sesiones en este período")
    ) // end padding wrapper
  );
}



function HorasEditor({m,onSave,onCancel}){
  const [minV,setMinV]=useState(m.horasMin||0);
  const [maxV,setMaxV]=useState(m.horasMax||0);
  const [err,setErr]=useState("");
  function go(){
    if(minV>maxV){setErr("El mínimo no puede superar el máximo");return;}
    onSave(minV,maxV);
  }
  return e("div",{style:{background:"var(--bg0)",border:"1px solid var(--border)",borderRadius:5,padding:10,marginBottom:12}},
    err&&e("div",{style:{fontSize:10,color:"var(--err-text)",marginBottom:6}},err),
    e("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}},
      e("div",null,
        e("label",{className:"fl",style:{display:"block",marginBottom:3}},"MÍN (hs/semana)"),
        e("input",{className:"fi",type:"number",min:0,max:40,value:minV,style:{padding:"5px 8px"},onChange:ev=>setMinV(parseInt(ev.target.value)||0)})
      ),
      e("div",null,
        e("label",{className:"fl",style:{display:"block",marginBottom:3}},"MÁX (hs/semana)"),
        e("input",{className:"fi",type:"number",min:0,max:40,value:maxV,style:{padding:"5px 8px"},onChange:ev=>setMaxV(parseInt(ev.target.value)||0)})
      )
    ),
    e("div",{style:{display:"flex",gap:6,justifyContent:"flex-end"}},
      e("button",{className:"savebtn",onClick:go},"✓ Guardar objetivos")
    )
  );
}

/* ─── SCHEMA HINT ── */
function SchemaHint(){
  const [open,setOpen]=useState(false);
  const schema=`{
  "materias":  [{ "id","nombre","codigo","color":"#hex","anio":2026,"periodo":"c1|c2|anual" }],
  "tipos":     [{ "id","label","icon":"emoji","bg":"#hex","accent":"#hex" }],
  "tareas": [{
    "id","titulo","descripcion",
    "materiaId","tipo","fechaLimite":"YYYY-MM-DD",
    "estado":"pendiente|en_progreso|completado",
    "prioridad":"alta|media|baja",
    "items": [{ "id","label","done":true|false }]
  }]
}`;
  return e("div",{className:"hint"},
    e("button",{className:"hintbtn",onClick:()=>setOpen(!open)},(open?"▲":"▼")+" Formato JSON del importador"),
    open&&e("pre",{className:"hintcode"},schema)
  );
}

applyTheme(localStorage.getItem("uai-theme")||"hueso");
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
